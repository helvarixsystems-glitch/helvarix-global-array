<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Helvarix Global Array</title>
  <meta name="theme-color" content="#070A13" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Supabase JS (Auth) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050710;
      --bg2:#070A13;
      --panel:rgba(12, 16, 34, .72);
      --panel2:rgba(12, 16, 34, .5);
      --stroke:rgba(61, 220, 255, .22);
      --stroke2:rgba(61, 220, 255, .12);
      --txt:#EAF2FF;
      --muted:rgba(234,242,255,.62);
      --cyan:#27D7FF;
      --violet:#7B4BFF;
      --warn:#FFCC5C;
      --bad:#FF5C7A;
      --shadow: 0 20px 50px rgba(0,0,0,.55);
      --radius:18px;
      --radius2:24px;
      --maxw:1100px;
      --font: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      color:var(--txt);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(123,75,255,.18), transparent 55%),
        radial-gradient(800px 500px at 20% 20%, rgba(39,215,255,.14), transparent 50%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    a{ color:inherit; text-decoration:none; }
    button, input, select, textarea{ font-family:inherit; }

    .app-shell{ min-height:100%; display:flex; flex-direction:column; }

    .topbar{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(5,7,16,.92), rgba(5,7,16,.62));
      border-bottom:1px solid rgba(61,220,255,.10);
      padding:14px 14px 12px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .brand{ display:flex; gap:12px; align-items:center; }
    .brandMark{
      width:42px; height:42px; border-radius:12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(39,215,255,.85), rgba(39,215,255,.25) 55%, transparent 60%),
        linear-gradient(135deg, rgba(39,215,255,.25), rgba(123,75,255,.25));
      border:1px solid rgba(39,215,255,.28);
      box-shadow: 0 0 35px rgba(39,215,255,.12);
    }
    .brandTitle{ font-weight:800; letter-spacing:.18em; font-size:14px; color:rgba(39,215,255,.92); }
    .brandSub{ font-weight:600; letter-spacing:.22em; font-size:10px; color:rgba(234,242,255,.55); margin-top:2px; }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:999px;
      background:rgba(12,16,34,.55);
      border:1px solid rgba(61,220,255,.16);
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
      font-size:11px; letter-spacing:.12em;
      color:rgba(234,242,255,.74);
      text-transform:uppercase;
      user-select:none;
      white-space:nowrap;
      cursor:pointer;
    }
    .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
    .dot.cyan{ background:var(--cyan); box-shadow:0 0 20px rgba(39,215,255,.35); }
    .dot.warn{ background:var(--warn); box-shadow:0 0 20px rgba(255,204,92,.25); }
    .dot.bad{ background:var(--bad); box-shadow:0 0 20px rgba(255,92,122,.25); }

    .view{
      width:100%;
      max-width:var(--maxw);
      margin:0 auto;
      padding:18px 14px 92px;
    }
    .sectionTitle{ font-size:28px; font-weight:800; letter-spacing:.02em; margin:10px 0 14px; }
    .subTitle{ margin:-6px 0 16px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-size:12px; }

    .card{
      background: linear-gradient(180deg, rgba(12,16,34,.78), rgba(12,16,34,.56));
      border:1px solid rgba(61,220,255,.18);
      border-radius:24px;
      box-shadow: var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .card + .card{ margin-top:12px; }
    .card::before{
      content:"";
      position:absolute; inset:-80px -80px auto auto;
      width:180px; height:180px;
      background: radial-gradient(circle at 50% 50%, rgba(123,75,255,.22), transparent 60%);
      transform: rotate(20deg);
      pointer-events:none;
    }
    .cardHeader{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .cardTitle{ font-weight:800; font-size:16px; letter-spacing:.06em; text-transform:uppercase; }
    .badge{
      padding:6px 10px; border-radius:999px;
      font-size:11px; letter-spacing:.12em; text-transform:uppercase;
      border:1px solid rgba(61,220,255,.18);
      background:rgba(7,10,19,.55);
      color:rgba(234,242,255,.72);
      user-select:none;
      white-space:nowrap;
    }
    .badge.violet{ border-color:rgba(123,75,255,.30); }
    .badge.cyan{ border-color:rgba(39,215,255,.30); }
    .badge.warn{ border-color:rgba(255,204,92,.35); color:rgba(255,204,92,.92); }

    .hr{ height:1px; background:rgba(61,220,255,.12); margin:14px 0; }

    .label{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(234,242,255,.62);
      margin:12px 0 8px;
    }
    .field{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(61,220,255,.16);
      background:rgba(7,10,19,.55);
      color:var(--txt);
      outline:none;
    }
    textarea.field{ min-height:92px; resize:vertical; }

    .tabs{ display:flex; gap:10px; margin:12px 0 10px; }
    .tabBtn{
      flex:1; text-align:center;
      padding:12px 10px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.14);
      background:rgba(7,10,19,.45);
      color:rgba(234,242,255,.72);
      cursor:pointer;
      user-select:none;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
    }
    .tabBtn.active{
      border-color:rgba(39,215,255,.28);
      box-shadow:0 0 0 2px rgba(39,215,255,.10) inset;
      color:rgba(39,215,255,.95);
    }

    .primary{
      width:100%;
      padding:16px 16px;
      border-radius:16px;
      border:1px solid rgba(123,75,255,.35);
      background: linear-gradient(90deg, rgba(123,75,255,.92), rgba(123,75,255,.72));
      color:white;
      font-weight:800;
      letter-spacing:.22em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: 0 18px 40px rgba(123,75,255,.25);
    }
    .primary:disabled{ opacity:.55; cursor:not-allowed; box-shadow:none; }
    .secondary{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.35);
      color:rgba(234,242,255,.78);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .danger{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,92,122,.30);
      background: rgba(255,92,122,.08);
      color:rgba(255,92,122,.92);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:14px 12px;
      border:1px solid rgba(61,220,255,.12);
      background: rgba(7,10,19,.45);
      border-radius:18px;
    }
    .listItem + .listItem{ margin-top:10px; }
    .meta{ font-size:11px; color:rgba(234,242,255,.62); letter-spacing:.08em; text-transform:uppercase; }
    .kpi{ text-align:right; font-weight:800; color:rgba(39,215,255,.92); }
    .kpi small{
      display:block;
      color:rgba(234,242,255,.55);
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
      margin-top:4px;
    }
    .empty{
      padding:16px;
      border-radius:18px;
      border:1px dashed rgba(61,220,255,.22);
      background: rgba(39,215,255,.04);
      color:rgba(234,242,255,.70);
      line-height:1.4;
    }
    .empty b{ color:rgba(39,215,255,.92); }

    .bottomNav{
      position:fixed; left:0; right:0; bottom:0;
      display:flex; gap:6px;
      padding:10px 10px 14px;
      background: linear-gradient(180deg, rgba(5,7,16,.1), rgba(5,7,16,.92));
      border-top:1px solid rgba(61,220,255,.10);
      backdrop-filter: blur(12px);
      z-index:20;
    }
    .navItem{
      flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px;
      padding:10px 6px;
      border-radius:16px;
      color:rgba(234,242,255,.55);
    }
    .navItem .ico{ font-size:18px; line-height:1; }
    .navItem .lbl{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; }
    .navItem.active{
      color:rgba(39,215,255,.95);
      border:1px solid rgba(39,215,255,.18);
      background: rgba(39,215,255,.06);
      box-shadow: 0 0 0 2px rgba(39,215,255,.08) inset;
    }
    .navItem.locked{ opacity:.55; }

    .toastWrap{
      position:fixed;
      left:0; right:0; bottom:88px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:50;
    }
    .toast{
      pointer-events:auto;
      width:min(520px, calc(100% - 24px));
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,.55);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      transform: translateY(12px);
      opacity:0;
      transition: all .2s ease;
    }
    .toast.show{ transform: translateY(0); opacity:1; }
    .toast .tTitle{ font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-size:12px; color:rgba(39,215,255,.92); }
    .toast .tMsg{ color:rgba(234,242,255,.78); font-size:12px; margin-top:3px; line-height:1.35; }
    .toast .tClose{
      border:none;
      background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:18px;
      line-height:1;
      padding:2px 6px;
    }

    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:60;
    }
    .modalOverlay.show{ display:flex; }
    .modal{
      width:min(720px, 100%);
      background: linear-gradient(180deg, rgba(12,16,34,.92), rgba(12,16,34,.72));
      border:1px solid rgba(61,220,255,.22);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding:14px;
      position:relative;
    }
    .modalTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:6px 6px 10px;
    }
    .modalTop .mTitle{
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
    }
    .modalTop .mClose{
      border:none; background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:20px; line-height:1;
      padding:4px 10px;
    }
  </style>
</head>

<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true"></div>
        <div>
          <div class="brandTitle">HELVARIX</div>
          <div class="brandSub">GLOBAL ARRAY</div>
        </div>
      </div>

      <div class="pill" id="statusPill" title="Account / Subscription">
        <span class="dot warn" id="statusDot"></span>
        <span id="statusText">CONNECTING…</span>
      </div>
    </header>

    <main id="view" class="view"></main>

    <div class="toastWrap" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast">
        <div>
          <div class="tTitle" id="toastTitle">Notice</div>
          <div class="tMsg" id="toastMsg"></div>
        </div>
        <button class="tClose" id="toastClose" aria-label="Close">×</button>
      </div>
    </div>

    <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal">
        <div class="modalTop">
          <div class="mTitle" id="modalTitle">Modal</div>
          <button class="mClose" id="modalClose" aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <nav class="bottomNav" aria-label="Primary">
      <a class="navItem" href="#/campaigns" title="Campaigns">
        <span class="ico">▦</span><span class="lbl">Campaigns</span>
      </a>
      <a class="navItem" href="#/telemetry" title="Feed">
        <span class="ico">◉</span><span class="lbl">Feed</span>
      </a>
      <a class="navItem" href="#/submit" title="Submit">
        <span class="ico">⌖</span><span class="lbl">Submit</span>
      </a>
      <a class="navItem" href="#/leaderboard" title="Ranks (Paid)">
        <span class="ico">🏆</span><span class="lbl">Ranks</span>
      </a>
      <a class="navItem" href="#/billing" title="Billing">
        <span class="ico">⛨</span><span class="lbl">Billing</span>
      </a>
      <a class="navItem" href="#/profile" title="Account">
        <span class="ico">⦿</span><span class="lbl">Account</span>
      </a>
    </nav>
  </div>

  <script>
    /******************************************************************
     * HELVARIX GLOBAL ARRAY — SINGLE-FILE FRONTEND
     *
     * Real data expects your backend routes:
     *   GET  /api/campaigns?status=active
     *   GET  /api/telemetry?limit=25
     *   POST /api/telemetry
     *   GET  /api/leaderboard?scope=global
     *   GET  /api/billing/subscription
     *   POST /api/stripe/create-checkout-session
     *   POST /api/stripe/create-portal-session
     *   GET  /api/me
     *   POST /api/profile
     ******************************************************************/

    /******************** CONFIG (SET THESE) ********************/
    const SUPABASE_URL = "REPLACE_WITH_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "REPLACE_WITH_SUPABASE_ANON_KEY";

    // same-domain backend (Cloudflare Pages Functions, etc.)
    const API_BASE = "";

    const PLANS = {
      monthly: { label: "$15 / month" },
      yearly:  { label: "$150 / year" }
    };

    const PAYWALLED_ROUTES = new Set([
      "/submit",
      "/leaderboard"
    ]);

    /******************** INIT SUPABASE (DECLARED ONCE) ********************/
    // IMPORTANT: we name the client "sb" to avoid "supabase already declared" collisions.
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /******************** DOM helpers ********************/
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    function el(tag, props={}, ...children){
      const node = document.createElement(tag);
      Object.assign(node, props);
      children.flat().filter(Boolean).forEach(ch => node.append(ch));
      return node;
    }
    const div = (cls, ...children) => el("div", { className: cls }, ...children);
    const h1 = (t) => el("div", { className:"sectionTitle", textContent:t });
    const sub = (t) => el("div", { className:"subTitle", textContent:t });
    const badge = (t, tone="") => el("div", { className:`badge ${tone}`, textContent:t });
    const hr = () => el("div", { className:"hr" });
    const empty = (title, msg) => el("div",{className:"empty"},
      el("div",{style:"margin-bottom:6px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(39,215,255,.92); font-size:12px;"}, title),
      el("div",{style:"color:rgba(234,242,255,.72); font-size:12px; line-height:1.4;"}, msg)
    );

    /******************** Toast + Modal ********************/
    const toastEl = $("#toast");
    const toastTitle = $("#toastTitle");
    const toastMsg = $("#toastMsg");
    const toastClose = $("#toastClose");
    let toastTimer = null;

    toastClose.addEventListener("click", hideToast);

    function showToast(title, msg, ms=2800){
      toastTitle.textContent = title;
      toastMsg.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, ms);
    }
    function hideToast(){ toastEl.classList.remove("show"); }

    const modalOverlay = $("#modalOverlay");
    const modalTitle = $("#modalTitle");
    const modalBody = $("#modalBody");
    const modalClose = $("#modalClose");

    modalClose.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });

    function openModal(title, bodyNode){
      modalTitle.textContent = title;
      modalBody.innerHTML = "";
      modalBody.append(bodyNode);
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      modalBody.innerHTML = "";
    }

    /******************** API client ********************/
    async function getAccessToken(){
      const { data } = await sb.auth.getSession();
      return data.session?.access_token || null;
    }

    async function api(path, options={}){
      const token = await getAccessToken();
      const headers = new Headers(options.headers || {});
      headers.set("Content-Type", "application/json");
      if (token) headers.set("Authorization", `Bearer ${token}`);

      const res = await fetch(API_BASE + path, { ...options, headers });
      const text = await res.text();

      let payload = null;
      try { payload = text ? JSON.parse(text) : null; } catch { payload = null; }

      if (!res.ok){
        const msg = payload?.error || payload?.message || `Request failed (${res.status})`;
        const err = new Error(msg);
        err.status = res.status;
        err.payload = payload;
        throw err;
      }
      return payload;
    }

    /******************** App state ********************/
    const STATE = {
      user: null,
      profile: null,
      subscription: null,
      campaigns: [],
      telemetry: [],
      leaderboard: []
    };

    function isSignedIn(){ return !!STATE.user; }
    function isPaid(){ return !!STATE.subscription?.active; }
    function routeRequiresPaid(path){ return PAYWALLED_ROUTES.has(path); }

    /******************** Status pill + nav locks ********************/
    const statusPill = $("#statusPill");
    statusPill.addEventListener("click", () => { location.hash = "#/profile"; });

    function updateStatusPill(){
      const dot = $("#statusDot");
      const text = $("#statusText");

      if (!isSignedIn()){
        dot.className = "dot bad";
        text.textContent = "SIGN IN REQUIRED";
        return;
      }

      if (STATE.subscription === null){
        dot.className = "dot warn";
        text.textContent = "CHECKING ACCESS…";
        return;
      }

      if (isPaid()){
        dot.className = "dot cyan";
        const plan = (STATE.subscription.plan || "ACTIVE").toString().toUpperCase();
        const until = STATE.subscription.current_period_end
          ? new Date(STATE.subscription.current_period_end).toISOString().slice(0,10)
          : "";
        text.textContent = until ? `ACTIVE • ${plan} • ${until}` : `ACTIVE • ${plan}`;
      } else {
        dot.className = "dot warn";
        text.textContent = "FREE • UPGRADE";
      }
    }

    function updateNavLocks(){
      const paid = isPaid();
      $$(".navItem").forEach(a => {
        const href = a.getAttribute("href") || "";
        const path = href.startsWith("#") ? href.slice(1) : href;
        if (routeRequiresPaid(path)){
          a.classList.toggle("locked", !paid);
        } else {
          a.classList.remove("locked");
        }
      });
    }

    /******************** Router (async-safe) ********************/
    const routes = {
      "/campaigns": renderCampaigns,
      "/telemetry": renderTelemetry,
      "/submit": renderSubmit,
      "/leaderboard": renderLeaderboard,
      "/billing": renderBilling,
      "/profile": renderProfile
    };

    window.addEventListener("hashchange", () => { render(); });

    boot();

    async function boot(){
      if (!location.hash) location.hash = "#/campaigns";

      const { data } = await sb.auth.getSession();
      STATE.user = data.session?.user || null;

      sb.auth.onAuthStateChange(async (_event, session) => {
        STATE.user = session?.user || null;
        STATE.profile = null;
        STATE.subscription = null;
        STATE.campaigns = [];
        STATE.telemetry = [];
        STATE.leaderboard = [];
        await hydrateCore();
        await render();
      });

      await hydrateCore();
      await render();
    }

    async function hydrateCore(){
      updateStatusPill();
      updateNavLocks();

      if (!isSignedIn()) return;

      try{
        const [subRes, meRes] = await Promise.all([
          api("/api/billing/subscription", { method: "GET" }),
          api("/api/me", { method: "GET" })
        ]);
        STATE.subscription = subRes;
        STATE.profile = meRes?.profile || null;
      }catch(e){
        STATE.subscription = { active:false, plan:null, current_period_end:null };
        showToast("Backend Not Ready", "Subscription/profile endpoints not responding yet.");
      }

      updateStatusPill();
      updateNavLocks();
    }

    async function render(){
      const pathFull = (location.hash || "#/campaigns").replace("#","") || "/campaigns";
      const path = pathFull.split("?")[0];

      // highlight nav
      $$(".navItem").forEach(a => a.classList.toggle("active", a.getAttribute("href") === `#${path}`));

      // enforce sign-in on protected routes
      if (!isSignedIn() && (path === "/submit" || path === "/leaderboard" || path === "/billing" || path === "/profile")){
        location.hash = "#/profile";
        return;
      }

      // enforce paywall
      if (routeRequiresPaid(path) && !isPaid()){
        location.hash = "#/billing";
        return;
      }

      const view = $("#view");
      const fn = routes[path] || renderNotFound;
      view.innerHTML = "";

      // IMPORTANT: await async pages so errors are predictable
      await fn(view);

      updateStatusPill();
      updateNavLocks();
    }

    function renderNotFound(root){
      root.append(h1("Not Found"), sub("Route does not exist."));
    }

    /******************** Shared UI helpers ********************/
    function progressBar(pct){
      const wrap = el("div",{className:"progress"});
      const bar = el("span");
      const p = Math.max(0, Math.min(100, Number(pct)||0));
      bar.style.width = `${p}%`;
      wrap.append(bar);
      return wrap;
    }

    function fieldInput(label, opts){
      const { type="text", placeholder="", value="", oninput=null, attrs={} } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const inp = el("input",{className:"field", type, placeholder, value, ...attrs});
      if (oninput) inp.addEventListener("input", () => oninput(inp.value));
      wrap.append(inp);
      return { wrap, input: inp };
    }

    function fieldTextarea(label, opts){
      const { placeholder="", value="", oninput=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const ta = el("textarea",{className:"field", placeholder});
      ta.value = value;
      if (oninput) ta.addEventListener("input", () => oninput(ta.value));
      wrap.append(ta);
      return { wrap, textarea: ta };
    }

    function fieldSelect(label, opts){
      const { options=[], value="", onchange=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const sel = el("select",{className:"field"});
      for (const o of options){
        const opt = el("option",{ value:o.value, textContent:o.label });
        if (o.value === value) opt.selected = true;
        sel.append(opt);
      }
      if (onchange) sel.addEventListener("change", () => onchange(sel.value));
      wrap.append(sel);
      return { wrap, select: sel };
    }

    /******************** PAGES ********************/

    async function renderCampaigns(root){
      root.append(h1("Campaigns"), sub("Campaigns are generated by the operator."));

      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Active Campaigns"}),
        badge("READ-ONLY")
      ));

      const body = div("");
      body.append(empty("Loading", "Fetching campaign directives…"));
      card.append(body);
      root.append(card);

      try{
        const res = await api("/api/campaigns?status=active", { method:"GET" });
        const campaigns = Array.isArray(res?.campaigns) ? res.campaigns : (Array.isArray(res) ? res : []);
        STATE.campaigns = campaigns;

        body.innerHTML = "";
        if (!campaigns.length){
          body.append(empty("No Active Campaigns", "No active missions are currently published."));
          return;
        }

        for (const c of campaigns){
          const title = String(c.title || "Untitled Campaign");
          const kind = String(c.kind || "campaign").toUpperCase();
          const desc = String(c.description || "");
          const endsIn = c.ends_in ? String(c.ends_in) : "";
          const progressPct = (typeof c.progress_pct === "number") ? c.progress_pct : null;
          const progressText = c.progress_text ? String(c.progress_text) : "";

          const item = div("card");
          item.append(div("cardHeader",
            el("div",{className:"cardTitle",textContent:title}),
            badge(kind, kind==="GLOBAL" ? "violet" : "cyan")
          ));

          if (endsIn) item.append(el("div",{className:"meta",textContent:`ENDS IN ${endsIn}`}));
          if (desc) item.append(el("div",{style:"color:rgba(234,242,255,.78); font-size:13px; line-height:1.45; margin-top:10px;"}, desc));

          if (progressText || progressPct !== null){
            item.append(hr());
            if (progressText) item.append(el("div",{className:"meta",textContent:progressText}));
            if (progressPct !== null) item.append(progressBar(progressPct));
          }

          root.append(item);
        }
      }catch(e){
        body.innerHTML = "";
        body.append(empty("Unable to Load Campaigns", "Your /api/campaigns endpoint isn’t returning data yet."));
        showToast("Campaign Load Failed", e.message || "Check backend endpoint.");
      }
    }

    async function renderTelemetry(root){
      root.append(h1("Community Telemetry Feed"), sub("Obfuscated Data Stream"));

      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Live Feed"}),
        badge("NETWORK")
      ));

      const body = div("");
      body.append(empty("Loading", "Retrieving latest submissions…"));
      card.append(body);
      root.append(card);

      try{
        const res = await api("/api/telemetry?limit=25", { method:"GET" });
        const rows = Array.isArray(res?.items) ? res.items : (Array.isArray(res) ? res : []);
        STATE.telemetry = rows;

        body.innerHTML = "";
        if (!rows.length){
          body.append(empty("No Telemetry Yet", "When nodes begin submitting, entries will appear here."));
          return;
        }

        for (const t of rows){
          const operator = String(t.operator_callsign || "—");
          const region = String(t.operator_region || "");
          const target = String(t.target || "—");
          const mode = String(t.mode || "").toUpperCase();
          const ts = t.timestamp ? new Date(t.timestamp).toISOString().replace("T"," ").slice(0,16) + " UTC" : "";
          const snr = (t.snr_db !== undefined && t.snr_db !== null) ? `${t.snr_db} dB` : "";
          const status = String(t.status || "PENDING").toUpperCase();

          const li = div("listItem");
          const left = div("");
          left.append(el("div",{style:"font-weight:800; font-size:18px; letter-spacing:.02em;"}, target));
          left.append(el("div",{className:"meta",textContent:`${operator}${region ? " • "+region : ""}${ts ? " • "+ts : ""}`}));
          li.append(left);

          const right = div("");
          right.append(badge(mode || "TELEMETRY", mode==="RADIO" ? "warn" : "cyan"));
          if (snr){
            right.append(el("div",{style:"margin-top:8px; text-align:right;", className:"meta", textContent:`SNR: ${snr}`}));
          }
          right.append(el("div",{style:"margin-top:6px; text-align:right;", className:"meta", textContent:`STATUS: ${status}`}));
          li.append(right);

          body.append(li);
        }
      }catch(e){
        body.innerHTML = "";
        body.append(empty("Unable to Load Feed", "Your /api/telemetry endpoint isn’t returning data yet."));
        showToast("Feed Load Failed", e.message || "Check backend endpoint.");
      }
    }

    async function renderSubmit(root){
      root.append(h1("Data Logging Protocol"), sub("Telemetry Stream: Active"));

      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Submission"}),
        badge("PROTOCOL", "violet")
      ));

      const modeRow = div("tabs");
      const modes = ["visual","spectral","radio"];
      let currentMode = "visual";
      const modeBtns = {};

      for (const m of modes){
        const b = el("button",{className:"tabBtn"+(m==="visual"?" active":""), type:"button", textContent:m});
        b.addEventListener("click", ()=>{
          currentMode = m;
          for (const k in modeBtns) modeBtns[k].classList.remove("active");
          modeBtns[m].classList.add("active");
          showToast("Mode Selected", `${m.toUpperCase()} protocol engaged.`);
        });
        modeBtns[m] = b;
        modeRow.append(b);
      }
      card.append(modeRow);

      let target = "";
      let bortle = "4";
      let equipment = "";
      let notes = "";
      let snrDb = "";
      let seeingArcsec = "";
      let transparency = "3";
      let integrationSeconds = "300";

      const fTarget = fieldInput("Target Object", { placeholder:"e.g. M31, NGC 7000", oninput:(v)=>target=v });
      const fBortle = fieldSelect("Sky Quality (Bortle Scale)", {
        value: bortle,
        options: [
          {value:"1", label:"Class 1 - Excellent Dark Sky"},
          {value:"2", label:"Class 2 - Typical Truly Dark Site"},
          {value:"3", label:"Class 3 - Rural Sky"},
          {value:"4", label:"Class 4 - Urban/Rural Transition"},
          {value:"5", label:"Class 5 - Suburban"},
          {value:"6", label:"Class 6 - Bright Suburban"},
          {value:"7", label:"Class 7 - Suburban/Urban Transition"},
          {value:"8", label:"Class 8 - City Sky"},
          {value:"9", label:"Class 9 - Inner City"}
        ],
        onchange:(v)=>bortle=v
      });

      const fEquip = fieldTextarea("Equipment & Software Infrastructure", {
        placeholder:"Specify make/model, extra hardware, and software used (e.g. N.I.N.A, PixInsight).",
        oninput:(v)=>equipment=v
      });

      const fSNR = fieldInput("Signal-to-Noise Ratio (dB)", { placeholder:"e.g. 17.0", oninput:(v)=>snrDb=v, attrs:{ inputMode:"decimal" }});
      const fSeeing = fieldInput("Seeing (arcsec)", { placeholder:"e.g. 1.5", oninput:(v)=>seeingArcsec=v, attrs:{ inputMode:"decimal" }});
      const fTrans = fieldSelect("Transparency (1-5)", {
        value: transparency,
        options: [
          {value:"1", label:"1 - Poor"},
          {value:"2", label:"2 - Fair"},
          {value:"3", label:"3 - Good"},
          {value:"4", label:"4 - Very Good"},
          {value:"5", label:"5 - Excellent"}
        ],
        onchange:(v)=>transparency=v
      });
      const fInt = fieldInput("Total Integration (s)", { placeholder:"e.g. 300", oninput:(v)=>integrationSeconds=v, attrs:{ inputMode:"numeric" }});

      const fNotes = fieldTextarea("Encrypted Frame Data (Optional)", {
        placeholder:"If your pipeline produces an encrypted payload reference, paste it here.",
        oninput:(v)=>notes=v
      });

      card.append(
        fTarget.wrap,
        fBortle.wrap,
        fEquip.wrap,
        hr(),
        fSNR.wrap,
        fSeeing.wrap,
        fTrans.wrap,
        fInt.wrap,
        hr(),
        fNotes.wrap
      );

      const btn = el("button",{className:"primary", textContent:"COMMIT DATA TO NETWORK", type:"button"});
      btn.addEventListener("click", async ()=>{
        if (!target.trim()){
          showToast("Target Required", "Enter a target object (e.g. M31).");
          return;
        }
        if (!equipment.trim()){
          showToast("Equipment Required", "Provide your equipment/software stack.");
          return;
        }

        btn.disabled = true;
        try{
          await api("/api/telemetry", {
            method:"POST",
            body: JSON.stringify({
              mode: currentMode,
              target: target.trim(),
              bortle_class: Number(bortle),
              equipment_stack: equipment.trim(),
              snr_db: snrDb ? Number(snrDb) : null,
              seeing_arcsec: seeingArcsec ? Number(seeingArcsec) : null,
              transparency: transparency ? Number(transparency) : null,
              integration_seconds: integrationSeconds ? Number(integrationSeconds) : null,
              encrypted_frame_data: notes ? String(notes) : null
            })
          });

          showToast("Submission Logged", "Telemetry committed. Status: PENDING.");
          location.hash = "#/telemetry";
        }catch(e){
          showToast("Submit Failed", e.message || "Check /api/telemetry.");
        }finally{
          btn.disabled = false;
        }
      });

      card.append(hr(), btn);
      root.append(card);
    }

    async function renderLeaderboard(root){
      root.append(h1("Global Sector Rankings"), sub("Reputation economy reflects validated telemetry."));

      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Rankings"}),
        badge("PAID", "violet")
      ));

      const body = div("");
      body.append(empty("Loading", "Aggregating network reputation metrics…"));
      card.append(body);
      root.append(card);

      try{
        const res = await api("/api/leaderboard?scope=global", { method:"GET" });
        const rows = Array.isArray(res?.items) ? res.items : (Array.isArray(res) ? res : []);
        STATE.leaderboard = rows;

        body.innerHTML = "";
        if (!rows.length){
          body.append(empty("No Rankings Yet", "When validated telemetry accumulates, rankings will appear here."));
          return;
        }

        let i = 1;
        for (const r of rows){
          const rank = r.rank ?? i;
          const name = String(r.callsign || "—");
          const role = String(r.role || "");
          const region = String(r.region || "");
          const oi = (r.total_oi !== undefined && r.total_oi !== null) ? String(r.total_oi) : "—";

          const li = div("listItem");
          li.append(el("div",{className:"meta",textContent:`#${String(rank).padStart(2,"0")}`}));

          const left = div("");
          left.append(el("div",{style:"font-weight:800; font-size:20px;"}, name));
          left.append(el("div",{className:"meta",textContent:`${role}${region ? " • " + region : ""}`}));
          li.append(left);

          li.append(el("div",{className:"kpi",textContent:oi}, el("small",{textContent:"TOTAL OI"})));
          body.append(li);
          i++;
        }
      }catch(e){
        body.innerHTML = "";
        body.append(empty("Unable to Load Rankings", "Your /api/leaderboard endpoint isn’t returning data yet."));
        showToast("Leaderboard Failed", e.message || "Check backend endpoint.");
      }
    }

    async function renderBilling(root){
      root.append(h1("Spectre Pro Tier"), sub("Operational participation requires membership."));

      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Enrollment"}),
        badge(isPaid() ? "ACTIVE" : "UPGRADE", isPaid() ? "cyan" : "warn")
      ));

      card.append(
        el("div",{style:"color:rgba(234,242,255,.78); font-size:13px; line-height:1.5; margin-top:8px;"},
          "Membership is enforced server-side via Stripe subscription checks."
        ),
        hr()
      );

      if (STATE.subscription){
        const s = STATE.subscription;
        const line = el("div",{className:"meta", style:"margin-bottom:10px;"});
        if (s.active){
          const until = s.current_period_end ? new Date(s.current_period_end).toISOString().slice(0,10) : "";
          line.textContent = `STATUS: ACTIVE${s.plan ? " • PLAN: "+String(s.plan).toUpperCase() : ""}${until ? " • UNTIL: "+until : ""}`;
        } else {
          line.textContent = "STATUS: FREE (NO ACTIVE MEMBERSHIP)";
        }
        card.append(line);
      }

      const btnMonthly = el("button",{className:"primary", type:"button", textContent:`ENROLL • ${PLANS.monthly.label}`});
      const btnYearly  = el("button",{className:"secondary", type:"button", textContent:`ENROLL • ${PLANS.yearly.label}`});

      btnMonthly.addEventListener("click", ()=>startCheckout("monthly"));
      btnYearly.addEventListener("click", ()=>startCheckout("yearly"));

      async function startCheckout(plan){
        try{
          const res = await api("/api/stripe/create-checkout-session", {
            method:"POST",
            body: JSON.stringify({ plan })
          });
          if (!res?.url) throw new Error("Checkout session missing URL.");
          window.location.href = res.url;
        }catch(e){
          showToast("Billing Error", e.message || "Check /api/stripe/create-checkout-session.");
        }
      }

      const manageBtn = el("button",{className:"secondary", type:"button", textContent:"MANAGE SUBSCRIPTION"});
      manageBtn.addEventListener("click", async ()=>{
        try{
          const res = await api("/api/stripe/create-portal-session", {
            method:"POST",
            body: JSON.stringify({})
          });
          if (!res?.url) throw new Error("Portal session missing URL.");
          window.location.href = res.url;
        }catch(e){
          showToast("Portal Error", e.message || "Check /api/stripe/create-portal-session.");
        }
      });

      card.append(btnMonthly, btnYearly);
      if (isPaid()) card.append(hr(), manageBtn);

      root.append(card);
    }

    async function renderProfile(root){
      root.append(h1("Account"), sub("Identity layer: member credentials and operator profile."));

      // SIGNED OUT
      if (!isSignedIn()){
        const card = div("card");
        card.append(div("cardHeader",
          el("div",{className:"cardTitle",textContent:"Sign In / Create Account"}),
          badge("REQUIRED", "warn")
        ));

        let email = "";
        let password = "";

        const fE = fieldInput("Email", { placeholder:"you@domain.com", oninput:(v)=>email=v, attrs:{ inputMode:"email" }});
        const fP = fieldInput("Password", { type:"password", placeholder:"••••••••", oninput:(v)=>password=v });

        const btnIn = el("button",{className:"secondary", type:"button", textContent:"SIGN IN"});
        const btnUp = el("button",{className:"primary", type:"button", textContent:"CREATE ACCOUNT"});

        btnIn.addEventListener("click", async ()=>{
          try{
            btnIn.disabled = true; btnUp.disabled = true;
            const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
            if (error) throw error;
            showToast("Signed In", "Welcome to Helvarix.");
          }catch(e){
            showToast("Sign In Failed", e.message || "Check credentials.");
          }finally{
            btnIn.disabled = false; btnUp.disabled = false;
          }
        });

        btnUp.addEventListener("click", async ()=>{
          try{
            btnIn.disabled = true; btnUp.disabled = true;
            const { error } = await sb.auth.signUp({ email: email.trim(), password });
            if (error) throw error;
            showToast("Account Created", "Check your email if confirmation is enabled.");
          }catch(e){
            showToast("Sign Up Failed", e.message || "Try a different password/email.");
          }finally{
            btnIn.disabled = false; btnUp.disabled = false;
          }
        });

        card.append(fE.wrap, fP.wrap, hr(), btnIn, btnUp);
        root.append(card);
        return;
      }

      // SIGNED IN
      const card = div("card");
      card.append(div("cardHeader",
        el("div",{className:"cardTitle",textContent:"Operator Profile"}),
        badge(isPaid() ? "ACTIVE" : "FREE", isPaid() ? "cyan" : "warn")
      ));

      const userEmail = STATE.user?.email || "—";
      card.append(el("div",{className:"meta",textContent:`SIGNED IN AS: ${userEmail}`}));

      let callsign = String(STATE.profile?.callsign || "");
      let region = String(STATE.profile?.region || "");
      let equipmentIndex = String(STATE.profile?.equipment_index || "");

      const fC = fieldInput("Callsign / Designation", { placeholder:"e.g. Cmdr. Starlight", value:callsign, oninput:(v)=>callsign=v });
      const fR = fieldInput("Region / Sector", { placeholder:"e.g. NA-EAST, EU-NORTH", value:region, oninput:(v)=>region=v });
      const fEQ = fieldInput("Equipment Index", { placeholder:"e.g. Advanced Telescope", value:equipmentIndex, oninput:(v)=>equipmentIndex=v });

      const saveBtn = el("button",{className:"primary", type:"button", textContent:"SAVE PROFILE"});
      const outBtn  = el("button",{className:"danger", type:"button", textContent:"SIGN OUT"});

      saveBtn.addEventListener("click", async ()=>{
        if (!callsign.trim() || !region.trim()){
          showToast("Missing Fields", "Callsign and region are required.");
          return;
        }
        saveBtn.disabled = true;
        try{
          const res = await api("/api/profile", {
            method:"POST",
            body: JSON.stringify({
              callsign: callsign.trim(),
              region: region.trim(),
              equipment_index: equipmentIndex.trim() || null
            })
          });
          STATE.profile = res?.profile || STATE.profile;
          showToast("Saved", "Profile updated.");
        }catch(e){
          showToast("Save Failed", e.message || "Check /api/profile endpoint.");
        }finally{
          saveBtn.disabled = false;
        }
      });

      outBtn.addEventListener("click", async ()=>{
        await sb.auth.signOut();
      });

      card.append(fC.wrap, fR.wrap, fEQ.wrap, hr(), saveBtn, outBtn);
      root.append(card);
    }
  </script>
