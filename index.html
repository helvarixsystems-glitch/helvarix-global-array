<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Helvarix Array</title>
  <meta name="theme-color" content="#070A13" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050710;
      --bg2:#070A13;
      --panel:rgba(12, 16, 34, .72);
      --panel2:rgba(12, 16, 34, .5);
      --stroke:rgba(61, 220, 255, .22);
      --stroke2:rgba(61, 220, 255, .12);
      --txt:#EAF2FF;
      --muted:rgba(234,242,255,.62);
      --cyan:#27D7FF;
      --violet:#7B4BFF;
      --amber:#E0B04B;
      --good:#21D69B;
      --warn:#FFCC5C;
      --bad:#FF5C7A;
      --shadow: 0 20px 50px rgba(0,0,0,.55);
      --radius:18px;
      --radius2:24px;
      --maxw:1100px;
      --font: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      color:var(--txt);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(123,75,255,.18), transparent 55%),
        radial-gradient(800px 500px at 20% 20%, rgba(39,215,255,.14), transparent 50%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    a{ color:inherit; text-decoration:none; }
    button, input, select, textarea{ font-family:inherit; }
    .app-shell{ min-height:100%; display:flex; flex-direction:column; }

    .topbar{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(5,7,16,.92), rgba(5,7,16,.62));
      border-bottom:1px solid rgba(61,220,255,.10);
      padding:14px 14px 12px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .brand{ display:flex; gap:12px; align-items:center; }
    .brandMark{
      width:42px; height:42px; border-radius:12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(39,215,255,.85), rgba(39,215,255,.25) 55%, transparent 60%),
        linear-gradient(135deg, rgba(39,215,255,.25), rgba(123,75,255,.25));
      border:1px solid rgba(39,215,255,.28);
      box-shadow: 0 0 35px rgba(39,215,255,.12);
    }
    .brandTitle{ font-weight:800; letter-spacing:.18em; font-size:14px; color:rgba(39,215,255,.92); }
    .brandSub{ font-weight:600; letter-spacing:.22em; font-size:10px; color:rgba(234,242,255,.55); margin-top:2px; }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:999px;
      background:rgba(12,16,34,.55);
      border:1px solid rgba(61,220,255,.16);
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
      font-size:11px; letter-spacing:.12em;
      color:rgba(234,242,255,.74);
      text-transform:uppercase;
      user-select:none;
    }
    .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
    .dot.cyan{ background:var(--cyan); box-shadow:0 0 20px rgba(39,215,255,.35); }
    .dot.violet{ background:var(--violet); box-shadow:0 0 20px rgba(123,75,255,.25); }
    .dot.bad{ background:var(--bad); box-shadow:0 0 20px rgba(255,92,122,.25); }

    .view{
      width:100%;
      max-width:var(--maxw);
      margin:0 auto;
      padding:18px 14px 92px;
    }

    .sectionTitle{ font-size:28px; font-weight:800; letter-spacing:.02em; margin:10px 0 14px; }
    .subTitle{ margin:-6px 0 16px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-size:12px; }

    .card{
      background: linear-gradient(180deg, rgba(12,16,34,.78), rgba(12,16,34,.56));
      border:1px solid rgba(61,220,255,.18);
      border-radius:var(--radius2);
      box-shadow: var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .card + .card{ margin-top:12px; }
    .card::before{
      content:"";
      position:absolute; inset:-80px -80px auto auto;
      width:180px; height:180px;
      background: radial-gradient(circle at 50% 50%, rgba(123,75,255,.22), transparent 60%);
      transform: rotate(20deg);
      pointer-events:none;
    }
    .cardHeader{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .cardTitle{ font-weight:800; font-size:16px; letter-spacing:.06em; text-transform:uppercase; }
    .badge{
      padding:6px 10px; border-radius:999px;
      font-size:11px; letter-spacing:.12em; text-transform:uppercase;
      border:1px solid rgba(61,220,255,.18);
      background:rgba(7,10,19,.55);
      color:rgba(234,242,255,.72);
      user-select:none;
      white-space:nowrap;
    }
    .badge.violet{ border-color:rgba(123,75,255,.30); }
    .badge.cyan{ border-color:rgba(39,215,255,.30); }
    .badge.warn{ border-color:rgba(255,204,92,.35); color:rgba(255,204,92,.92); }

    .hr{ height:1px; background:rgba(61,220,255,.12); margin:14px 0; }

    .label{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(234,242,255,.62);
      margin:12px 0 8px;
    }
    .field, select, textarea{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(61,220,255,.16);
      background:rgba(7,10,19,.55);
      color:var(--txt);
      outline:none;
    }
    textarea{ min-height:92px; resize:vertical; }
    .help{
      margin-top:8px;
      color:rgba(234,242,255,.55);
      font-size:12px;
      line-height:1.35;
    }

    .tabs{ display:flex; gap:10px; margin:12px 0 10px; }
    .tabBtn{
      flex:1; text-align:center;
      padding:12px 10px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.14);
      background:rgba(7,10,19,.45);
      color:rgba(234,242,255,.72);
      cursor:pointer;
      user-select:none;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
    }
    .tabBtn.active{
      border-color:rgba(39,215,255,.28);
      box-shadow:0 0 0 2px rgba(39,215,255,.10) inset;
      color:rgba(39,215,255,.95);
    }

    .primary{
      width:100%;
      padding:16px 16px;
      border-radius:16px;
      border:1px solid rgba(123,75,255,.35);
      background: linear-gradient(90deg, rgba(123,75,255,.92), rgba(123,75,255,.72));
      color:white;
      font-weight:800;
      letter-spacing:.22em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: 0 18px 40px rgba(123,75,255,.25);
    }
    .primary:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
    }
    .secondary{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.35);
      color:rgba(234,242,255,.78);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .danger{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,92,122,.30);
      background: rgba(255,92,122,.08);
      color:rgba(255,92,122,.92);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .row{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 12px;
      background:rgba(7,10,19,.45);
      border:1px solid rgba(61,220,255,.12);
      border-radius:16px;
    }
    .row + .row{ margin-top:10px; }

    .rowLeft{ display:flex; flex-direction:column; gap:4px; }
    .rowBig{ font-weight:800; font-size:18px; letter-spacing:.04em; }
    .rowSmall{ color:var(--muted); font-size:12px; letter-spacing:.08em; }

    .kpi{
      text-align:right;
      font-weight:800;
      color:rgba(39,215,255,.92);
    }
    .kpi small{
      display:block;
      color:rgba(234,242,255,.55);
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
      margin-top:4px;
    }

    .progress{
      height:10px;
      border-radius:999px;
      background:rgba(234,242,255,.10);
      overflow:hidden;
      border:1px solid rgba(61,220,255,.10);
    }
    .progress > span{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(39,215,255,.95), rgba(123,75,255,.95));
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:14px 12px;
      border:1px solid rgba(61,220,255,.12);
      background: rgba(7,10,19,.45);
      border-radius:18px;
    }
    .listItem + .listItem{ margin-top:10px; }
    .meta{ font-size:11px; color:rgba(234,242,255,.62); letter-spacing:.08em; text-transform:uppercase; }
    .empty{
      padding:16px;
      border-radius:18px;
      border:1px dashed rgba(61,220,255,.22);
      background: rgba(39,215,255,.04);
      color:rgba(234,242,255,.70);
      line-height:1.4;
    }
    .empty b{ color:rgba(39,215,255,.92); }

    .bottomNav{
      position:fixed; left:0; right:0; bottom:0;
      display:flex; gap:6px;
      padding:10px 10px 14px;
      background: linear-gradient(180deg, rgba(5,7,16,.1), rgba(5,7,16,.92));
      border-top:1px solid rgba(61,220,255,.10);
      backdrop-filter: blur(12px);
      z-index:20;
    }
    .navItem{
      flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px;
      padding:10px 6px;
      border-radius:16px;
      color:rgba(234,242,255,.55);
    }
    .navItem .ico{ font-size:18px; line-height:1; }
    .navItem .lbl{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; }
    .navItem.active{
      color:rgba(39,215,255,.95);
      border:1px solid rgba(39,215,255,.18);
      background: rgba(39,215,255,.06);
      box-shadow: 0 0 0 2px rgba(39,215,255,.08) inset;
    }

    .grid{
      display:grid;
      gap:14px;
    }
    .grid.two{ grid-template-columns: 1fr; }
    @media(min-width:920px){
      .grid.two{ grid-template-columns: 1.2fr .8fr; }
    }

    .canvasWrap{
      width:100%;
      border-radius:var(--radius2);
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.42);
      overflow:hidden;
    }
    canvas{ display:block; width:100%; height:auto; }

    .toastWrap{
      position:fixed;
      left:0; right:0; bottom:88px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:50;
    }
    .toast{
      pointer-events:auto;
      width:min(520px, calc(100% - 24px));
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,.55);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      transform: translateY(12px);
      opacity:0;
      transition: all .2s ease;
    }
    .toast.show{ transform: translateY(0); opacity:1; }
    .toast .tTitle{ font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-size:12px; color:rgba(39,215,255,.92); }
    .toast .tMsg{ color:rgba(234,242,255,.78); font-size:12px; margin-top:3px; line-height:1.35; }
    .toast .tClose{
      border:none;
      background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:18px;
      line-height:1;
      padding:2px 6px;
    }

    /* simple modal */
    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:60;
    }
    .modalOverlay.show{ display:flex; }
    .modal{
      width:min(720px, 100%);
      background: linear-gradient(180deg, rgba(12,16,34,.92), rgba(12,16,34,.72));
      border:1px solid rgba(61,220,255,.22);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding:14px;
      position:relative;
    }
    .modalTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:6px 6px 10px;
    }
    .modalTop .mTitle{
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
    }
    .modalTop .mClose{
      border:none; background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:20px; line-height:1;
      padding:4px 10px;
    }
  </style>
</head>

<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true"></div>
        <div>
          <div class="brandTitle">HELVARIX</div>
          <div class="brandSub">GLOBAL ARRAY</div>
        </div>
      </div>
      <div class="pill" id="netPill" title="Network status">
        <span class="dot cyan" id="netDot"></span>
        <span id="netText">LOCAL MODE</span>
      </div>
    </header>

    <main id="view" class="view"></main>

    <div class="toastWrap" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast">
        <div>
          <div class="tTitle" id="toastTitle">Notice</div>
          <div class="tMsg" id="toastMsg"></div>
        </div>
        <button class="tClose" id="toastClose" aria-label="Close">×</button>
      </div>
    </div>

    <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal">
        <div class="modalTop">
          <div class="mTitle" id="modalTitle">Modal</div>
          <button class="mClose" id="modalClose" aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <nav class="bottomNav" aria-label="Primary">
      <a class="navItem" href="#/campaigns" data-route="campaigns" title="Campaigns">
        <span class="ico">▦</span><span class="lbl">Campaigns</span>
      </a>
      <a class="navItem" href="#/nodes" data-route="nodes" title="Nodes">
        <span class="ico">⌁</span><span class="lbl">Nodes</span>
      </a>
      <a class="navItem" href="#/telemetry" data-route="telemetry" title="Telemetry">
        <span class="ico">◉</span><span class="lbl">Feed</span>
      </a>
      <a class="navItem" href="#/submit" data-route="submit" title="Submit">
        <span class="ico">⌖</span><span class="lbl">Submit</span>
      </a>
      <a class="navItem" href="#/leaderboard" data-route="leaderboard" title="Leaderboard">
        <span class="ico">🏆</span><span class="lbl">Ranks</span>
      </a>
      <a class="navItem" href="#/guild" data-route="guild" title="Guild">
        <span class="ico">⛨</span><span class="lbl">Guild</span>
      </a>
      <a class="navItem" href="#/profile" data-route="profile" title="Profile">
        <span class="ico">⦿</span><span class="lbl">Profile</span>
      </a>
    </nav>
  </div>

  <script>
    /******************************************************************
     * HELVARIX ARRAY — FUNCTIONAL BASE (NO FILLER DISPLAYED)
     * - Local-first: campaigns, submissions, feed, leaderboard work now
     * - IndexedDB stores actual uploaded files (images/audio/etc)
     * - “Global” features are wired through NetworkAdapter so you can
     *   later plug Firebase/Supabase/your API without rewriting UI.
     ******************************************************************/

    /******************** DOM helpers ********************/
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    function el(tag, props={}, ...children){
      const node = document.createElement(tag);
      Object.assign(node, props);
      children.flat().filter(Boolean).forEach(ch => node.append(ch));
      return node;
    }
    const div = (cls, ...children) => el("div", { className: cls }, ...children);
    const h1 = (t) => el("div", { className:"sectionTitle", textContent:t });
    const sub = (t) => el("div", { className:"subTitle", textContent:t });
    const badge = (t, tone="") => el("div", { className:`badge ${tone}`, textContent:t });
    const hr = () => el("div", { className:"hr" });
    const empty = (title, msg) => el("div",{className:"empty"},
      el("div",{style:"margin-bottom:6px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(39,215,255,.92); font-size:12px;"}, title),
      el("div",{style:"color:rgba(234,242,255,.72); font-size:12px; line-height:1.4;"}, msg)
    );

    /******************** Toast + Modal ********************/
    const toastEl = $("#toast");
    const toastTitle = $("#toastTitle");
    const toastMsg = $("#toastMsg");
    const toastClose = $("#toastClose");
    let toastTimer = null;

    toastClose.addEventListener("click", hideToast);
    function showToast(title, msg, ms=2600){
      toastTitle.textContent = title;
      toastMsg.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, ms);
    }
    function hideToast(){ toastEl.classList.remove("show"); }

    const modalOverlay = $("#modalOverlay");
    const modalTitle = $("#modalTitle");
    const modalBody = $("#modalBody");
    const modalClose = $("#modalClose");

    modalClose.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });

    function openModal(title, bodyNode){
      modalTitle.textContent = title;
      modalBody.innerHTML = "";
      modalBody.append(bodyNode);
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      modalBody.innerHTML = "";
    }

    /******************** Storage (structured) ********************/
    const LS = {
      get(key, fallback){
        try{
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        }catch{ return fallback; }
      },
      set(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
    };

    /******************** IndexedDB (files) ********************/
    const IDB_NAME = "helvarix_files";
    const IDB_STORE = "files";

    function idbOpen(){
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE, { keyPath: "id" });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbPutFile(record){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readwrite");
        tx.objectStore(IDB_STORE).put(record);
        tx.oncomplete = () => { db.close(); resolve(true); };
        tx.onerror = () => { const err = tx.error; db.close(); reject(err); };
      });
    }
    async function idbGetFile(id){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readonly");
        const req = tx.objectStore(IDB_STORE).get(id);
        req.onsuccess = () => { const v = req.result || null; db.close(); resolve(v); };
        req.onerror = () => { const err = req.error; db.close(); reject(err); };
      });
    }
    async function idbDeleteFile(id){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readwrite");
        tx.objectStore(IDB_STORE).delete(id);
        tx.oncomplete = () => { db.close(); resolve(true); };
        tx.onerror = () => { const err = tx.error; db.close(); reject(err); };
      });
    }

    /******************** Data Model ********************
     * profile: operator identity + settings
     * campaigns: created locally (later sync)
     * submissions: real records referencing uploaded file IDs
     ****************************************************/
    const DEFAULT_PROFILE = {
      callsign: "",
      region: "",
      equipment: "",
      guildToken: "",
      allowGeo: false
    };

    const DB = {
      profile: LS.get("hvx_profile", DEFAULT_PROFILE),
      campaigns: LS.get("hvx_campaigns", []),
      submissions: LS.get("hvx_submissions", []),
      reviews: LS.get("hvx_reviews", []),
      presence: LS.get("hvx_presence", { lastPing: 0, lat: null, lon: null })
    };

    function saveAll(){
      LS.set("hvx_profile", DB.profile);
      LS.set("hvx_campaigns", DB.campaigns);
      LS.set("hvx_submissions", DB.submissions);
      LS.set("hvx_reviews", DB.reviews);
      LS.set("hvx_presence", DB.presence);
    }

    /******************** Network Adapter ********************
     * Replace these methods when you add backend.
     * Right now they are local-only and ALWAYS truthful.
     *******************************************************/
    const NetworkAdapter = {
      mode: "local", // "local" | "connected"
      async pingPresence(pres){
        // In real mode: send to server (websocket/REST) and receive global presence list.
        DB.presence = { ...DB.presence, ...pres, lastPing: Date.now() };
        saveAll();
        return { ok:true, global: null };
      },
      async syncCampaigns(){ return { ok:true, campaigns: DB.campaigns }; },
      async syncSubmissions(){ return { ok:true, submissions: DB.submissions }; },
      async publishSubmission(){ return { ok:true }; }
    };

    /******************** Router ********************/
    const routes = {
      "/campaigns": renderCampaigns,
      "/nodes": renderNodes,
      "/telemetry": renderTelemetry,
      "/submit": renderSubmit,
      "/leaderboard": renderLeaderboard,
      "/guild": renderGuild,
      "/profile": renderProfile
    };

    init();

    function init(){
      // First-run: push user to Profile to set callsign/region
      if (!location.hash) location.hash = "#/campaigns";
      window.addEventListener("hashchange", render);
      bootNetworkPill();
      render();

      // periodic local ping (if geo enabled, we attach coords)
      setInterval(() => doPresencePing(false), 20_000);
      doPresencePing(true);
    }

    function bootNetworkPill(){
      const dot = $("#netDot");
      const text = $("#netText");
      if (NetworkAdapter.mode === "local"){
        dot.className = "dot warn";
        text.textContent = "LOCAL MODE";
      } else {
        dot.className = "dot cyan";
        text.textContent = "CONNECTED";
      }
    }

    async function doPresencePing(forceGeo){
      const pres = { lastPing: Date.now() };
      if (DB.profile.allowGeo && (forceGeo || DB.presence.lat == null)){
        try{
          const pos = await getGeo();
          pres.lat = pos.coords.latitude;
          pres.lon = pos.coords.longitude;
        }catch{
          // geo denied; keep silent
        }
      }
      await NetworkAdapter.pingPresence(pres);
    }

    function getGeo(){
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error("Geolocation not supported"));
        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy:false, timeout:6000, maximumAge: 120000 });
      });
    }

    function render(){
      const path = location.hash.replace("#","") || "/campaigns";
      const view = $("#view");
      const fn = routes[path] || renderNotFound;

      $$(".navItem").forEach(a => a.classList.toggle("active", a.getAttribute("href") === `#${path}`));

      view.innerHTML = "";
      fn(view);
      saveAll();
    }

    function renderNotFound(root){
      root.append(h1("Not Found"), sub("Route does not exist."));
    }

    /******************** Utility ********************/
    const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2));
    const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
    const fmtUTC = (d)=> new Date(d).toISOString().replace("T"," ").slice(0,16) + " UTC";

    function requireProfileReady(){
      if (!DB.profile.callsign || !DB.profile.region){
        showToast("Setup Required", "Set callsign and region in Profile before submitting or joining campaigns.");
        return false;
      }
      return true;
    }

    function computeOIForSubmission(sub){
      // simple real rules (tweak later):
      // - visual: base 200 + (integrationSeconds/10) + (snr*5)
      // - radio: base 220 + (integrationSeconds/8) + (snr*6)
      // - spectral: base 240 + (integrationSeconds/9) + (snr*6)
      const integ = Number(sub.integrationSeconds || 0);
      const snr = Number(sub.snrDb || 0);
      const mode = sub.mode;
      let base=200, wI=10, wS=5;
      if (mode==="radio"){ base=220; wI=8; wS=6; }
      if (mode==="spectral"){ base=240; wI=9; wS=6; }
      const v = base + (integ / wI) + (snr * wS);
      return Math.max(0, Math.round(v));
    }

    function computeCIForSubmission(sub){
      // Campaign Impact:
      // - daily/weekly/global each have multipliers depending on if submission matches
      // - here we compute base CI from quality; campaign matching handled elsewhere
      const snr = Number(sub.snrDb || 0);
      const seeing = Number(sub.seeingArcsec || 0);
      const transparency = Number(sub.transparency || 0);
      let score = 50 + snr * 8;
      if (seeing) score += clamp((2.5 - seeing) * 20, -30, 30);
      if (transparency) score += (transparency - 3) * 12;
      return Math.max(0, Math.round(score));
    }

    function matchesCampaign(c, sub){
      // A submission matches a campaign if:
      // - mode matches (or campaign mode == "any")
      // - target matches if campaign target specified (exact or prefix like "M31")
      // - window active (now within start/end if set)
      const now = Date.now();
      if (c.startAt && now < new Date(c.startAt).getTime()) return false;
      if (c.endAt && now > new Date(c.endAt).getTime()) return false;

      if (c.mode && c.mode !== "any" && c.mode !== sub.mode) return false;

      const t = (sub.target || "").trim().toLowerCase();
      const ct = (c.target || "").trim().toLowerCase();
      if (ct){
        // allow comma-separated targets in campaign: "M31, NGC 7000"
        const list = ct.split(",").map(s=>s.trim()).filter(Boolean);
        if (!list.some(x => t === x || t.startsWith(x))) return false;
      }
      return true;
    }

    function computeCampaignProgress(c){
      // progress: total matching submissions vs goal
      const goal = Math.max(1, Number(c.goalSubmissions || 1));
      const matching = DB.submissions.filter(s => matchesCampaign(c, s)).length;
      const pct = clamp((matching / goal) * 100, 0, 100);
      return { matching, goal, pct: Math.round(pct) };
    }

    function sortedLeaderboard(){
      // leaderboard derived ONLY from real submissions in DB
      // Sum OI by callsign; CI likewise
      const map = new Map();
      for (const s of DB.submissions){
        const key = s.operatorCallsign || "UNKNOWN";
        const cur = map.get(key) || { callsign:key, oi:0, ci:0, submissions:0, region: s.operatorRegion || "" };
        cur.oi += Number(s.oi || 0);
        cur.ci += Number(s.ci || 0);
        cur.submissions += 1;
        if (!cur.region && s.operatorRegion) cur.region = s.operatorRegion;
        map.set(key, cur);
      }
      return Array.from(map.values()).sort((a,b)=>b.oi-a.oi);
    }

    /******************** Forms helpers ********************/
    function fieldInput(label, opts){
      const { type="text", placeholder="", value="", oninput=null, attrs={} } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const inp = el("input",{className:"field", type, placeholder, value, ...attrs});
      if (oninput) inp.addEventListener("input", () => oninput(inp.value));
      wrap.append(inp);
      return { wrap, input: inp };
    }

    function fieldTextarea(label, opts){
      const { placeholder="", value="", oninput=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const ta = el("textarea",{className:"field", placeholder});
      ta.value = value;
      if (oninput) ta.addEventListener("input", () => oninput(ta.value));
      wrap.append(ta);
      return { wrap, textarea: ta };
    }

    function fieldSelect(label, opts){
      const { options=[], value="", onchange=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const sel = el("select",{className:"field"});
      for (const o of options){
        const opt = el("option",{ value:o.value, textContent:o.label });
        if (o.value === value) opt.selected = true;
        sel.append(opt);
      }
      if (onchange) sel.addEventListener("change", () => onchange(sel.value));
      wrap.append(sel);
      return { wrap, select: sel };
    }

    function fieldSlider(label, opts){
      const { min=1, max=5, value=3, onchange=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const row = div("row");
      const range = el("input",{ type:"range", min, max, value, style:"width:100%" });
      const read = el("div",{ className:"kpi", textContent:String(value) });
      range.addEventListener("input", () => {
        read.textContent = String(range.value);
        if (onchange) onchange(Number(range.value));
      });
      row.append(range, read);
      wrap.append(row);
      return { wrap, range };
    }

    function progressBar(pct){
      const wrap = el("div",{className:"progress"});
      const bar = el("span");
      bar.style.width = `${clamp(pct,0,100)}%`;
      wrap.append(bar);
      return wrap;
    }

    function campaignsCard(){
      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Active Campaigns"}), badge("LIVE")));

      if (DB.campaigns.length === 0){
        card.append(empty("No Campaigns Yet",
          "Create a campaign on the right. Campaign progress updates only from real submissions that match the campaign rules."
        ));
        return card;
      }

      const active = DB.campaigns
        .filter(c => !c.archived)
        .sort((a,b)=> new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());

      if (active.length === 0){
        card.append(empty("No Active Campaigns",
          "You have campaigns saved, but they’re archived. Create a new one or unarchive from the campaign manager."
        ));
        return card;
      }

      for (const c of active){
        const prog = computeCampaignProgress(c);

        const item = div("card");
        item.append(
          div("cardHeader",
            el("div",{className:"cardTitle",textContent:c.title}),
            badge(c.kind.toUpperCase(), c.kind==="global"?"violet":"cyan")
          ),
          el("div",{className:"meta",textContent: campaignMetaLine(c)}),
          el("div",{style:"height:10px"}),
          progressBar(prog.pct),
          el("div",{style:"height:10px"}),
          el("div",{className:"rowSmall",textContent:`MATCHING SUBMISSIONS: ${prog.matching}/${prog.goal}`}),
          el("div",{style:"height:10px"}),
          el("button",{className:"secondary", textContent:"Manage Campaign"})
        );

        item.querySelector("button").addEventListener("click", () => openCampaignManager(c.id));
        card.append(item);

    function campaignMetaLine(c){
      const parts = [];
      parts.push(c.mode ? `MODE: ${c.mode.toUpperCase()}` : "MODE: ANY");
      if (c.target) parts.push(`TARGET: ${c.target}`);
      if (c.endAt) parts.push(`ENDS: ${fmtUTC(c.endAt)}`);
      if (c.goalSubmissions) parts.push(`GOAL: ${c.goalSubmissions}`);
      return parts.join(" • ");
    }

    function createCampaignCard(){
      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Create Campaign"}), badge("ADMIN")));

      const titleF = fieldInput("Campaign Title", { placeholder:"e.g., Capture Jupiter", value:"" });
      const descF = fieldTextarea("Description", { placeholder:"What should observers submit? Any constraints?" });

      const kindF = fieldSelect("Type", {
        value:"daily",
        options:[
          {value:"daily", label:"Daily"},
          {value:"weekly", label:"Weekly"},
          {value:"global", label:"Global"}
        ]
      });

      const modeF = fieldSelect("Mode",{
        value:"visual",
        options:[
          {value:"any", label:"Any"},
          {value:"visual", label:"Visual"},
          {value:"spectral", label:"Spectral"},
          {value:"radio", label:"Radio"}
        ]
      });

      const targetF = fieldInput("Target Filter (optional)", { placeholder:"e.g., M31 or NGC 7000 or M13, M92" });
      const goalF = fieldInput("Goal Submissions", { type:"number", placeholder:"e.g., 100000", value:"", attrs:{min:"1", step:"1"} });

      const endF = fieldInput("End Time (UTC, optional)", { type:"datetime-local", value:"" });

      const createBtn = el("button",{className:"primary",textContent:"Create Campaign"});
      createBtn.addEventListener("click", () => {
        const title = titleF.input.value.trim();
        const desc = descF.textarea.value.trim();
        if (!title){
          showToast("Missing Field", "Campaign title is required.");
          return;
        }
        const c = {
          id: uid(),
          kind: kindF.select.value,
          title,
          description: desc,
          mode: modeF.select.value,
          target: targetF.input.value.trim(),
          goalSubmissions: goalF.input.value ? Number(goalF.input.value) : null,
          startAt: new Date().toISOString(),
          endAt: endF.input.value ? new Date(endF.input.value).toISOString() : null,
          createdAt: new Date().toISOString(),
          archived: false
        };
        DB.campaigns.unshift(c);
        saveAll();
        showToast("Campaign Created", "Your campaign is now active. Progress will update from matching submissions.");
        render();
      });

      card.append(
        titleF.wrap,
        descF.wrap,
        kindF.wrap,
        modeF.wrap,
        targetF.wrap,
        goalF.wrap,
        endF.wrap,
        el("div",{className:"help"}, "Targets can be comma-separated. A submission matches if its target equals or starts with any campaign target (case-insensitive)."),
        el("div",{style:"height:10px"}),
        createBtn
      );

      return card;
    }

    function openCampaignManager(campaignId){
      const c = DB.campaigns.find(x => x.id === campaignId);
      if (!c) return;

      const body = el("div");

      const titleF = fieldInput("Campaign Title", { value:c.title });
      const descF = fieldTextarea("Description", { value:c.description || "" });

      const kindF = fieldSelect("Type",{
        value:c.kind,
        options:[
          {value:"daily", label:"Daily"},
          {value:"weekly", label:"Weekly"},
          {value:"global", label:"Global"}
        ]
      });

      const modeF = fieldSelect("Mode",{
        value:c.mode || "any",
        options:[
          {value:"any", label:"Any"},
          {value:"visual", label:"Visual"},
          {value:"spectral", label:"Spectral"},
          {value:"radio", label:"Radio"}
        ]
      });

      const targetF = fieldInput("Target Filter (optional)", { value:c.target || "" });
      const goalF = fieldInput("Goal Submissions", { type:"number", value: c.goalSubmissions ? String(c.goalSubmissions) : "", attrs:{min:"1",step:"1"} });

      const endLocal = c.endAt ? toLocalDatetimeValue(c.endAt) : "";
      const endF = fieldInput("End Time (UTC, optional)", { type:"datetime-local", value:endLocal });

      const prog = computeCampaignProgress(c);

      const progRow = div("row",
        div("rowLeft",
          el("div",{className:"rowBig",textContent:`Progress: ${prog.matching}/${prog.goal}`}),
          el("div",{className:"rowSmall",textContent:`Matches are derived from real submissions only.`})
        ),
        el("div",{className:"kpi", innerHTML:`${prog.pct}%<small>COMPLETE</small>`})
      );

      const saveBtn = el("button",{className:"primary",textContent:"Save Changes"});
      saveBtn.addEventListener("click", () => {
        c.title = titleF.input.value.trim() || c.title;
        c.description = descF.textarea.value.trim();
        c.kind = kindF.select.value;
        c.mode = modeF.select.value;
        c.target = targetF.input.value.trim();
        c.goalSubmissions = goalF.input.value ? Number(goalF.input.value) : null;
        c.endAt = endF.input.value ? new Date(endF.input.value).toISOString() : null;
        saveAll();
        closeModal();
        showToast("Saved", "Campaign updated.");
        render();
      });

      const archiveBtn = el("button",{className:"secondary",textContent: c.archived ? "Unarchive" : "Archive"});
      archiveBtn.addEventListener("click", () => {
        c.archived = !c.archived;
        saveAll();
        closeModal();
        showToast("Updated", c.archived ? "Campaign archived." : "Campaign active again.");
        render();
      });

      const delBtn = el("button",{className:"danger",textContent:"Delete Campaign"});
      delBtn.addEventListener("click", () => {
        if (!confirm("Delete this campaign? This cannot be undone.")) return;
        DB.campaigns = DB.campaigns.filter(x => x.id !== c.id);
        saveAll();
        closeModal();
        showToast("Deleted", "Campaign removed.");
        render();
      });

      body.append(
        progRow,
        el("div",{style:"height:10px"}),
        progressBar(prog.pct),
        hr(),
        titleF.wrap,
        descF.wrap,
        kindF.wrap,
        modeF.wrap,
        targetF.wrap,
        goalF.wrap,
        endF.wrap,
        el("div",{style:"height:12px"}),
        saveBtn,
        el("div",{style:"height:10px"}),
        archiveBtn,
        el("div",{style:"height:10px"}),
        delBtn
      );

      openModal("Campaign Manager", body);
    }

    function toLocalDatetimeValue(iso){
      const d = new Date(iso);
      const pad = (n)=>String(n).padStart(2,"0");
      // datetime-local expects local time string; we show local conversion
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function drawLocalNodes(canvas){
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;

      ctx.clearRect(0,0,w,h);
      ctx.fillStyle = "rgba(7,10,19,.35)";
      ctx.fillRect(0,0,w,h);

      // grid
      ctx.lineWidth = 1;
      for (let x=0; x<=w; x+=40){
        ctx.strokeStyle = x%200===0 ? "rgba(39,215,255,.12)" : "rgba(39,215,255,.05)";
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
      }
      for (let y=0; y<=h; y+=40){
        ctx.strokeStyle = y%200===0 ? "rgba(39,215,255,.12)" : "rgba(39,215,255,.05)";
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
      }

      // label
      ctx.fillStyle = "rgba(39,215,255,.65)";
      ctx.font = "600 12px Montserrat";
      ctx.fillText("HELVARIX ARRAY • LOCAL PRESENCE", 18, 28);

      // If geo: project lon/lat to 2D.
      // This is a simple equirectangular projection (good enough for UI placeholder).
      if (DB.profile.allowGeo && DB.presence.lat != null && DB.presence.lon != null){
        const x = ((DB.presence.lon + 180) / 360) * (w-120) + 60;
        const y = ((90 - DB.presence.lat) / 180) * (h-120) + 60;

        ctx.fillStyle = "rgba(39,215,255,.90)";
        ctx.shadowColor = "rgba(39,215,255,.35)";
        ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(123,75,255,.22)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.stroke();

        ctx.fillStyle = "rgba(234,242,255,.78)";
        ctx.font = "600 12px Montserrat";
        ctx.fillText(DB.profile.callsign || "LOCAL NODE", x+14, y-12);
      } else {
        ctx.fillStyle = "rgba(234,242,255,.55)";
        ctx.font = "600 12px Montserrat";
        ctx.fillText("No geo location available. Enable geo in Profile to place your node.", 18, 54);
      }
    }

    async function openSubmissionDetails(subId){
      const s = DB.submissions.find(x => x.id === subId);
      if (!s) return;

      const body = el("div");

      const header = div("row",
        div("rowLeft",
          el("div",{className:"rowBig",textContent:s.target || "UNSPECIFIED TARGET"}),
          el("div",{className:"rowSmall",textContent:`${(s.mode||"").toUpperCase()} • ${fmtUTC(s.createdAt)}`})
        ),
        el("div",{className:"kpi", innerHTML:`${s.oi}<small>OI</small>`})
      );

      body.append(header, hr());

      const meta = el("div",{className:"meta",textContent:`OPERATOR: ${s.operatorCallsign||"UNKNOWN"} • REGION: ${s.operatorRegion||"UNSET"}`});
      body.append(meta, el("div",{style:"height:10px"}));

      // file preview
      if (s.fileId){
        const fileRec = await idbGetFile(s.fileId).catch(()=>null);
        if (fileRec && fileRec.blob){
          const url = URL.createObjectURL(fileRec.blob);
          const t = fileRec.type || "";
          if (t.startsWith("image/")){
            body.append(el("div",{className:"label",textContent:"Frame Preview"}));
            body.append(el("img",{src:url, style:"width:100%; border-radius:18px; border:1px solid rgba(61,220,255,.14);"}));
          } else if (t.startsWith("audio/")){
            body.append(el("div",{className:"label",textContent:"Audio Preview"}));
            body.append(el("audio",{controls:true, src:url, style:"width:100%"}));
          } else {
            body.append(el("div",{className:"label",textContent:"Attached File"}));
            body.append(el("a",{href:url, download:fileRec.name || "attachment", className:"secondary", textContent:`Download ${fileRec.name||"file"}`}));
          }
          body.append(el("div",{className:"help"}, `FILE: ${fileRec.name || "unknown"} • TYPE: ${fileRec.type || "unknown"} • SIZE: ${Math.round((fileRec.blob.size||0)/1024)} KB`));
        } else {
          body.append(empty("Missing File", "The submission references a file that isn't present in IndexedDB (it may have been cleared)."));
        }
      } else {
        body.append(empty("No File Attached", "This submission was stored without a file."));
      }

      body.append(hr());

      const delBtn = el("button",{className:"danger",textContent:"Delete Submission"});
      delBtn.addEventListener("click", async () => {
        if (!confirm("Delete this submission? This will remove it from feed and leaderboard.")) return;
        const target = DB.submissions.find(x => x.id === subId);
        DB.submissions = DB.submissions.filter(x => x.id !== subId);
        saveAll();
        if (target?.fileId) await idbDeleteFile(target.fileId).catch(()=>{});
        closeModal();
        showToast("Deleted", "Submission removed.");
        render();
      });

      body.append(delBtn);
      openModal("Telemetry Entry", body);
    }

    /******************** PAGE 4: Submit ********************/
    function renderSubmit(root){
      root.append(h1("Data Logging Protocol"), sub("Commit real observation telemetry. Stored locally. No filler."));

      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Submission Console"}), badge("READY")));

      if (!requireProfileReady()){
        card.append(empty("Profile Required",
          "Set your callsign and region in Profile to unlock submissions. This prevents anonymous, unverifiable records."
        ));
        root.append(card);
        return;
      }

      // mode tabs
      const currentMode = LS.get("hvx_submit_mode", "visual");
      const tabs = el("div",{className:"tabs"});
      const modes = ["visual","spectral","radio"];
      for (const m of modes){
        const b = el("button",{className:`tabBtn ${m===currentMode?"active":""}`, textContent:m});
        b.addEventListener("click", () => { LS.set("hvx_submit_mode", m); render(); });
        tabs.append(b);
      }

      // fields
      const targetF = fieldInput("Target Object", { placeholder:"e.g., M31, NGC 7000", value: LS.get("hvx_submit_target","") });
      targetF.input.addEventListener("input", ()=> LS.set("hvx_submit_target", targetF.input.value));

      const bortleF = fieldSelect("Sky Quality (Bortle)", {
        value: LS.get("hvx_submit_bortle","class4"),
        options:[
          {value:"class1", label:"Class 1 - Pristine"},
          {value:"class2", label:"Class 2 - Dark"},
          {value:"class3", label:"Class 3 - Rural"},
          {value:"class4", label:"Class 4 - Urban/Rural"},
          {value:"class5", label:"Class 5 - Suburban"},
          {value:"class6", label:"Class 6 - Bright Suburban"},
          {value:"class7", label:"Class 7 - Urban"},
          {value:"class8", label:"Class 8 - City"},
          {value:"class9", label:"Class 9 - Inner City"}
        ],
        onchange:(v)=>LS.set("hvx_submit_bortle", v)
      });

      const seeingF = fieldInput("Seeing (arcsec)", { type:"number", placeholder:"e.g., 1.5", value: LS.get("hvx_submit_seeing",""), attrs:{step:"0.1", min:"0.3", max:"5.0"} });
      seeingF.input.addEventListener("input", ()=>LS.set("hvx_submit_seeing", seeingF.input.value));

      const transpF = fieldSlider("Transparency (1–5)", {
        min:1, max:5,
        value: Number(LS.get("hvx_submit_transparency", 3)),
        onchange:(v)=>LS.set("hvx_submit_transparency", v)
      });

      const integF = fieldInput("Total Integration (seconds)", { type:"number", placeholder:"e.g., 300", value: LS.get("hvx_submit_integration",""), attrs:{step:"1", min:"1"} });
      integF.input.addEventListener("input", ()=>LS.set("hvx_submit_integration", integF.input.value));

      const gainF = fieldInput("Gain / ISO", { type:"number", placeholder:"e.g., 100", value: LS.get("hvx_submit_gain",""), attrs:{step:"1", min:"1"} });
      gainF.input.addEventListener("input", ()=>LS.set("hvx_submit_gain", gainF.input.value));

      const snrF = fieldInput("Measured SNR (dB)", { type:"number", placeholder:"e.g., 25.6", value: LS.get("hvx_submit_snr",""), attrs:{step:"0.1", min:"0"} });
      snrF.input.addEventListener("input", ()=>LS.set("hvx_submit_snr", snrF.input.value));

      const hwF = fieldTextarea("Hardware & Software Stack", { placeholder:"Telescope/camera/SDR + processing tools (PixInsight, GNU Radio, etc.)", value: LS.get("hvx_submit_hw","") });
      hwF.textarea.addEventListener("input", ()=>LS.set("hvx_submit_hw", hwF.textarea.value));

      const notesF = fieldTextarea("Notes (optional)", { placeholder:"Anything the validators should know (conditions, calibration, anomalies).", value: LS.get("hvx_submit_notes","") });
      notesF.textarea.addEventListener("input", ()=>LS.set("hvx_submit_notes", notesF.textarea.value));

      // file input
      const fileWrap = el("div");
      fileWrap.append(el("div",{className:"label",textContent:"Attach Data File (recommended)"}));

      const fileHelp = el("div",{className:"help",
        textContent: currentMode==="visual"
          ? "Attach an image frame (PNG/JPG/TIFF) or a ZIP of your capture output."
          : currentMode==="radio"
            ? "Attach audio (WAV) or data export (CSV/JSON)."
            : "Attach spectrum export (CSV/JSON) or a ZIP bundle."
      });

      const fileInput = el("input",{ className:"field", type:"file", accept: fileAcceptForMode(currentMode) });
      fileInput.style.padding = "12px 14px";

      let stagedFile = null;
      fileInput.addEventListener("change", () => {
        stagedFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
        showToast("File Staged", stagedFile ? stagedFile.name : "No file selected.");
      });

      fileWrap.append(fileInput, fileHelp);

      // commit
      const commitBtn = el("button",{className:"primary",textContent:"Commit Data To Network"});
      commitBtn.addEventListener("click", async () => {
        // validate required
        const target = targetF.input.value.trim();
        if (!target){
          showToast("Missing Field", "Target Object is required.");
          return;
        }
        const integ = Number(integF.input.value || 0);
        if (!integ || integ < 1){
          showToast("Missing Field", "Total Integration must be ≥ 1.");
          return;
        }

        commitBtn.disabled = true;
        commitBtn.textContent = "COMMITTING…";

        try{
          // store file in IDB (optional)
          let fileId = null;
          if (stagedFile){
            fileId = uid();
            await idbPutFile({
              id: fileId,
              name: stagedFile.name,
              type: stagedFile.type,
              createdAt: new Date().toISOString(),
              blob: stagedFile
            });
          }

          const subRec = {
            id: uid(),
            createdAt: new Date().toISOString(),

            operatorCallsign: DB.profile.callsign,
            operatorRegion: DB.profile.region,

            mode: currentMode,
            target,

            bortle: bortleF.select.value,
            seeingArcsec: seeingF.input.value ? Number(seeingF.input.value) : null,
            transparency: Number(LS.get("hvx_submit_transparency", 3)),
            integrationSeconds: integ,
            gainIso: gainF.input.value ? Number(gainF.input.value) : null,
            snrDb: snrF.input.value ? Number(snrF.input.value) : 0,

            hardware: hwF.textarea.value.trim() || DB.profile.equipment || "",
            notes: notesF.textarea.value.trim() || "",

            fileId
          };

          // derive scoring from real fields
          subRec.oi = computeOIForSubmission(subRec);
          subRec.ci = computeCIForSubmission(subRec);

          DB.submissions.unshift(subRec);
          saveAll();

          // publish hook (real network later)
          await NetworkAdapter.publishSubmission(subRec);

          // clear staged file
          stagedFile = null;
          fileInput.value = "";

          showToast("Committed", `Submission stored. OI +${subRec.oi} (derived from your actual inputs).`);
          location.hash = "#/telemetry";
        }catch(err){
          console.error(err);
          showToast("Error", err?.message || "Failed to commit submission.");
        }finally{
          commitBtn.disabled = false;
          commitBtn.textContent = "Commit Data To Network";
        }
      });

      card.append(
        tabs,
        targetF.wrap,
        bortleF.wrap,
        seeingF.wrap,
        transpF.wrap,
        integF.wrap,
        gainF.wrap,
        snrF.wrap,
        hwF.wrap,
        notesF.wrap,
        fileWrap,
        hr(),
        commitBtn
      );

      root.append(card);
    }

    function fileAcceptForMode(mode){
      if (mode==="visual") return "image/*,.tif,.tiff,.fits,.fit,.zip,.json,.csv";
      if (mode==="radio") return "audio/*,.wav,.zip,.json,.csv";
      if (mode==="spectral") return ".zip,.json,.csv,.txt";
      return "*/*";
    }

    /******************** PAGE 5: Leaderboard ********************/
    function renderLeaderboard(root){
      root.append(h1("Global Leaderboard"), sub("Computed from real submissions stored here. Plug a backend to make it truly global."));

      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Rankings"}), badge("DERIVED")));

      const rows = sortedLeaderboard();

      if (rows.length === 0){
        card.append(empty("No Rankings Yet",
          "Rankings appear after at least one real submission exists. Go to Submit and commit data."
        ));
        root.append(card);
        return;
      }

      rows.slice(0, 25).forEach((r, idx) => {
        const li = div("listItem",
          div("rowLeft",
            el("div",{className:"rowBig",textContent:`#${String(idx+1).padStart(2,"0")}  ${r.callsign}`}),
            el("div",{className:"meta",textContent:`${r.region || "UNSET"} • SUBMISSIONS: ${r.submissions}`})
          ),
          el("div",{className:"kpi", innerHTML:`${Math.round(r.oi).toLocaleString()}<small>TOTAL OI</small>`})
        );
        card.append(li);
      });

      // export/import buttons (to support “community” without backend)
      const tools = div("card");
      tools.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Data Exchange"}), badge("OPTIONAL", "warn")));

      const exportBtn = el("button",{className:"secondary",textContent:"Export Local Data (JSON)"});
      exportBtn.addEventListener("click", () => exportJSON());

      const importBtn = el("button",{className:"secondary",textContent:"Import Data (JSON)"});
      importBtn.addEventListener("click", () => importJSON());

      tools.append(
        el("div",{className:"help"}, "Until you connect a backend, you can still share community datasets by exporting/importing JSON. This is fully functional and uses real submissions."),
        el("div",{style:"height:10px"}),
        exportBtn,
        el("div",{style:"height:10px"}),
        importBtn
      );

      root.append(card, tools);
    }

    function exportJSON(){
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        profile: DB.profile,
        campaigns: DB.campaigns,
        submissions: DB.submissions
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = el("a",{ href:url, download:`helvarix_export_${Date.now()}.json` });
      document.body.append(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Exported", "JSON downloaded. (Files are not included — only metadata.)");
    }

    function importJSON(){
      const input = el("input",{ type:"file", accept:"application/json" });
      input.addEventListener("change", async () => {
        const f = input.files?.[0];
        if (!f) return;
        try{
          const text = await f.text();
          const data = JSON.parse(text);
          if (!data || typeof data !== "object") throw new Error("Invalid JSON");
          if (!Array.isArray(data.campaigns) || !Array.isArray(data.submissions)) throw new Error("Missing campaigns/submissions arrays");

          // merge (simple): append new records that don't exist by id
          const existingCampaignIds = new Set(DB.campaigns.map(x=>x.id));
          const existingSubIds = new Set(DB.submissions.map(x=>x.id));

          for (const c of data.campaigns){
            if (c?.id && !existingCampaignIds.has(c.id)) DB.campaigns.push(c);
          }
          for (const s of data.submissions){
            if (s?.id && !existingSubIds.has(s.id)) DB.submissions.push(s);
          }

          saveAll();
          showToast("Imported", "Campaigns/submissions merged. Note: attached files are not included in imports.");
          render();
        }catch(err){
          console.error(err);
          showToast("Import Failed", err?.message || "Could not import.");
        }
      });
      input.click();
    }

    /******************** PAGE 6: Guild (Firewall) ********************/
    function renderGuild(root){
      root.append(h1("Guild"), sub("Advanced campaigns. Access controlled by token."));

      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Firewall"}), badge("RESTRICTED", "violet")));

      if (!DB.profile.guildToken){
        card.append(empty("Locked",
          "No guild token set. Open Profile and set a Guild Access Token to unlock this tab. In a real network, tokens would be validated server-side."
        ));
        root.append(card);
        return;
      }

      card.append(
        div("row",
          div("rowLeft",
            el("div",{className:"rowBig",textContent:"Authorized"}),
            el("div",{className:"rowSmall",textContent:`TOKEN: ${mask(DB.profile.guildToken)} • LOCAL VALIDATION`})
          ),
          el("div",{className:"kpi", innerHTML:`ON<small>ACCESS</small>`})
        ),
        hr(),
        empty("Guild Campaigns",
          "Guild campaigns become meaningful once a backend enforces limited slots and difficulty tiers. You can still create campaigns from the Campaigns tab and treat them as ‘guild-only’ by convention for now."
        )
      );

      root.append(card);
    }

    function mask(s){ return s.length <= 6 ? "••••••" : `${s.slice(0,3)}•••${s.slice(-2)}`; }

    /******************** PAGE 7: Profile ********************/
    function renderProfile(root){
      root.append(h1("Profile & Settings"), sub("Set operator identity. Enable geo. Configure guild access."));

      const card = div("card");
      card.append(div("cardHeader", el("div",{className:"cardTitle",textContent:"Operator Configuration"}), badge("SETUP")));

      const callsignF = fieldInput("Callsign / Designation", { placeholder:"e.g., Cmdr. Starlight", value: DB.profile.callsign || "" });
      const regionF = fieldSelect("Region", {
        value: DB.profile.region || "",
        options:[
          {value:"", label:"(Select region)"},
          {value:"NA-EAST", label:"NA-EAST"},
          {value:"NA-WEST", label:"NA-WEST"},
          {value:"EU-NORTH", label:"EU-NORTH"},
          {value:"EU-WEST", label:"EU-WEST"},
          {value:"ASIA-PAC", label:"ASIA-PAC"},
          {value:"AU-WEST", label:"AU-WEST"},
          {value:"SELF-LINK", label:"SELF-LINK"}
        ]
      });

      const equipF = fieldInput("Equipment Index", { placeholder:"e.g., 8\" Astrograph + ASI294MC + PixInsight", value: DB.profile.equipment || "" });
      const tokenF = fieldInput("Guild Access Token (optional)", { placeholder:"e.g., HVX-ALPHA-001", value: DB.profile.guildToken || "" });

      const geoRow = div("row",
        div("rowLeft",
          el("div",{className:"rowBig",textContent:"Geolocation"}),
          el("div",{className:"rowSmall",textContent:"If enabled, Nodes tab can place your node on the map."})
        ),
        el("button",{className:"secondary", style:"width:auto; padding:10px 12px;", textContent: DB.profile.allowGeo ? "Disable" : "Enable" })
      );

      geoRow.querySelector("button").addEventListener("click", async () => {
        if (!DB.profile.allowGeo){
          try{
            await getGeo(); // request permission
            DB.profile.allowGeo = true;
            saveAll();
            showToast("Geo Enabled", "Your node can now be placed on the map.");
            await doPresencePing(true);
            render();
          }catch{
            showToast("Geo Denied", "Permission denied or unavailable.");
          }
        } else {
          DB.profile.allowGeo = false;
          DB.presence.lat = null;
          DB.presence.lon = null;
          saveAll();
          showToast("Geo Disabled", "Node placement disabled.");
          render();
        }
      });

      const saveBtn = el("button",{className:"primary",textContent:"Save Profile"});
      saveBtn.addEventListener("click", async () => {
        DB.profile.callsign = callsignF.input.value.trim();
        DB.profile.region = regionF.select.value;
        DB.profile.equipment = equipF.input.value.trim();
        DB.profile.guildToken = tokenF.input.value.trim();

        saveAll();
        showToast("Saved", "Profile updated.");
        await doPresencePing(true);
        render();
      });

      const resetBtn = el("button",{className:"danger",textContent:"Factory Reset (Local Data)"});
      resetBtn.addEventListener("click", async () => {
        if (!confirm("This will erase ALL local campaigns, submissions, and profile settings on this browser/device. Continue?")) return;

        // clear structured
        localStorage.removeItem("hvx_profile");
        localStorage.removeItem("hvx_campaigns");
        localStorage.removeItem("hvx_submissions");
        localStorage.removeItem("hvx_reviews");
        localStorage.removeItem("hvx_presence");
        localStorage.removeItem("hvx_submit_mode");
        localStorage.removeItem("hvx_submit_target");
        localStorage.removeItem("hvx_submit_bortle");
        localStorage.removeItem("hvx_submit_seeing");
        localStorage.removeItem("hvx_submit_transparency");
        localStorage.removeItem("hvx_submit_integration");
        localStorage.removeItem("hvx_submit_gain");
        localStorage.removeItem("hvx_submit_snr");
        localStorage.removeItem("hvx_submit_hw");
        localStorage.removeItem("hvx_submit_notes");

        // clear in-memory
        DB.profile = { ...DEFAULT_PROFILE };
        DB.campaigns = [];
        DB.submissions = [];
        DB.reviews = [];
        DB.presence = { lastPing: 0, lat: null, lon: null };

        // clear IDB files
        await clearAllFiles();

        saveAll();
        showToast("Reset", "Local data erased.");
        location.hash = "#/campaigns";
        render();
      });

      card.append(
        callsignF.wrap,
        regionF.wrap,
        equipF.wrap,
        tokenF.wrap,
        el("div",{style:"height:12px"}),
        geoRow,
        el("div",{style:"height:12px"}),
        saveBtn,
        el("div",{style:"height:10px"}),
        resetBtn
      );

      root.append(card);
    }

    async function clearAllFiles(){
      // deletes entire DB by deleting database
      await new Promise((resolve) => {
        const req = indexedDB.deleteDatabase(IDB_NAME);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(true);
        req.onblocked = () => resolve(true);
      });
    }
  </script>
