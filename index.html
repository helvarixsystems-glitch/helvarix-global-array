<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Helvarix Array</title>
  <meta name="theme-color" content="#070A13" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050710;
      --bg2:#070A13;
      --panel:rgba(12, 16, 34, .72);
      --panel2:rgba(12, 16, 34, .5);
      --stroke:rgba(61, 220, 255, .22);
      --stroke2:rgba(61, 220, 255, .12);
      --txt:#EAF2FF;
      --muted:rgba(234,242,255,.62);
      --cyan:#27D7FF;
      --violet:#7B4BFF;
      --warn:#FFCC5C;
      --bad:#FF5C7A;
      --shadow: 0 20px 50px rgba(0,0,0,.55);
      --radius:18px;
      --radius2:24px;
      --maxw:1100px;
      --font: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      color:var(--txt);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(123,75,255,.18), transparent 55%),
        radial-gradient(800px 500px at 20% 20%, rgba(39,215,255,.14), transparent 50%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    a{ color:inherit; text-decoration:none; }
    button, input, select, textarea{ font-family:inherit; }
    .app-shell{ min-height:100%; display:flex; flex-direction:column; }

    .topbar{
      position:sticky; top:0; z-index:10;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(5,7,16,.92), rgba(5,7,16,.62));
      border-bottom:1px solid rgba(61,220,255,.10);
      padding:14px 14px 12px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .brand{ display:flex; gap:12px; align-items:center; }
    .brandMark{
      width:42px; height:42px; border-radius:12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(39,215,255,.85), rgba(39,215,255,.25) 55%, transparent 60%),
        linear-gradient(135deg, rgba(39,215,255,.25), rgba(123,75,255,.25));
      border:1px solid rgba(39,215,255,.28);
      box-shadow: 0 0 35px rgba(39,215,255,.12);
    }
    .brandTitle{ font-weight:800; letter-spacing:.18em; font-size:14px; color:rgba(39,215,255,.92); }
    .brandSub{ font-weight:600; letter-spacing:.22em; font-size:10px; color:rgba(234,242,255,.55); margin-top:2px; }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:999px;
      background:rgba(12,16,34,.55);
      border:1px solid rgba(61,220,255,.16);
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
      font-size:11px; letter-spacing:.12em;
      color:rgba(234,242,255,.74);
      text-transform:uppercase;
      user-select:none;
      white-space:nowrap;
    }
    .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
    .dot.cyan{ background:var(--cyan); box-shadow:0 0 20px rgba(39,215,255,.35); }
    .dot.violet{ background:var(--violet); box-shadow:0 0 20px rgba(123,75,255,.25); }
    .dot.warn{ background:var(--warn); box-shadow:0 0 20px rgba(255,204,92,.25); }
    .dot.bad{ background:var(--bad); box-shadow:0 0 20px rgba(255,92,122,.25); }

    .view{
      width:100%;
      max-width:var(--maxw);
      margin:0 auto;
      padding:18px 14px 92px;
    }
    .sectionTitle{ font-size:28px; font-weight:800; letter-spacing:.02em; margin:10px 0 14px; }
    .subTitle{ margin:-6px 0 16px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; font-size:12px; }

    .card{
      background: linear-gradient(180deg, rgba(12,16,34,.78), rgba(12,16,34,.56));
      border:1px solid rgba(61,220,255,.18);
      border-radius:var(--radius2);
      box-shadow: var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .card + .card{ margin-top:12px; }
    .card::before{
      content:"";
      position:absolute; inset:-80px -80px auto auto;
      width:180px; height:180px;
      background: radial-gradient(circle at 50% 50%, rgba(123,75,255,.22), transparent 60%);
      transform: rotate(20deg);
      pointer-events:none;
    }
    .cardHeader{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .cardTitle{ font-weight:800; font-size:16px; letter-spacing:.06em; text-transform:uppercase; }
    .badge{
      padding:6px 10px; border-radius:999px;
      font-size:11px; letter-spacing:.12em; text-transform:uppercase;
      border:1px solid rgba(61,220,255,.18);
      background:rgba(7,10,19,.55);
      color:rgba(234,242,255,.72);
      user-select:none;
      white-space:nowrap;
    }
    .badge.violet{ border-color:rgba(123,75,255,.30); }
    .badge.cyan{ border-color:rgba(39,215,255,.30); }
    .badge.warn{ border-color:rgba(255,204,92,.35); color:rgba(255,204,92,.92); }

    .hr{ height:1px; background:rgba(61,220,255,.12); margin:14px 0; }

    .label{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(234,242,255,.62);
      margin:12px 0 8px;
    }
    .field, select, textarea{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(61,220,255,.16);
      background:rgba(7,10,19,.55);
      color:var(--txt);
      outline:none;
    }
    textarea{ min-height:92px; resize:vertical; }
    .help{
      margin-top:8px;
      color:rgba(234,242,255,.55);
      font-size:12px;
      line-height:1.35;
    }

    .tabs{ display:flex; gap:10px; margin:12px 0 10px; }
    .tabBtn{
      flex:1; text-align:center;
      padding:12px 10px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.14);
      background:rgba(7,10,19,.45);
      color:rgba(234,242,255,.72);
      cursor:pointer;
      user-select:none;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:12px;
    }
    .tabBtn.active{
      border-color:rgba(39,215,255,.28);
      box-shadow:0 0 0 2px rgba(39,215,255,.10) inset;
      color:rgba(39,215,255,.95);
    }

    .primary{
      width:100%;
      padding:16px 16px;
      border-radius:16px;
      border:1px solid rgba(123,75,255,.35);
      background: linear-gradient(90deg, rgba(123,75,255,.92), rgba(123,75,255,.72));
      color:white;
      font-weight:800;
      letter-spacing:.22em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: 0 18px 40px rgba(123,75,255,.25);
    }
    .primary:disabled{ opacity:.55; cursor:not-allowed; box-shadow:none; }
    .secondary{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.35);
      color:rgba(234,242,255,.78);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .danger{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,92,122,.30);
      background: rgba(255,92,122,.08);
      color:rgba(255,92,122,.92);
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .row{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 12px;
      background:rgba(7,10,19,.45);
      border:1px solid rgba(61,220,255,.12);
      border-radius:16px;
    }
    .row + .row{ margin-top:10px; }
    .rowLeft{ display:flex; flex-direction:column; gap:4px; }
    .rowBig{ font-weight:800; font-size:18px; letter-spacing:.04em; }
    .rowSmall{ color:var(--muted); font-size:12px; letter-spacing:.08em; }

    .kpi{ text-align:right; font-weight:800; color:rgba(39,215,255,.92); }
    .kpi small{
      display:block;
      color:rgba(234,242,255,.55);
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
      margin-top:4px;
    }

    .progress{
      height:10px;
      border-radius:999px;
      background:rgba(234,242,255,.10);
      overflow:hidden;
      border:1px solid rgba(61,220,255,.10);
    }
    .progress > span{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(39,215,255,.95), rgba(123,75,255,.95));
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:14px 12px;
      border:1px solid rgba(61,220,255,.12);
      background: rgba(7,10,19,.45);
      border-radius:18px;
    }
    .listItem + .listItem{ margin-top:10px; }
    .meta{ font-size:11px; color:rgba(234,242,255,.62); letter-spacing:.08em; text-transform:uppercase; }
    .empty{
      padding:16px;
      border-radius:18px;
      border:1px dashed rgba(61,220,255,.22);
      background: rgba(39,215,255,.04);
      color:rgba(234,242,255,.70);
      line-height:1.4;
    }
    .empty b{ color:rgba(39,215,255,.92); }

    .bottomNav{
      position:fixed; left:0; right:0; bottom:0;
      display:flex; gap:6px;
      padding:10px 10px 14px;
      background: linear-gradient(180deg, rgba(5,7,16,.1), rgba(5,7,16,.92));
      border-top:1px solid rgba(61,220,255,.10);
      backdrop-filter: blur(12px);
      z-index:20;
    }
    .navItem{
      flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px;
      padding:10px 6px;
      border-radius:16px;
      color:rgba(234,242,255,.55);
    }
    .navItem .ico{ font-size:18px; line-height:1; }
    .navItem .lbl{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; }
    .navItem.active{
      color:rgba(39,215,255,.95);
      border:1px solid rgba(39,215,255,.18);
      background: rgba(39,215,255,.06);
      box-shadow: 0 0 0 2px rgba(39,215,255,.08) inset;
    }
    .navItem.locked{ opacity:.55; }
    .navItem.locked .ico{ filter: grayscale(1); }
    .grid{ display:grid; gap:14px; }
    .grid.two{ grid-template-columns: 1fr; }
    @media(min-width:920px){ .grid.two{ grid-template-columns: 1.2fr .8fr; } }

    .toastWrap{
      position:fixed;
      left:0; right:0; bottom:88px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:50;
    }
    .toast{
      pointer-events:auto;
      width:min(520px, calc(100% - 24px));
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(61,220,255,.18);
      background: rgba(7,10,19,.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,.55);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      transform: translateY(12px);
      opacity:0;
      transition: all .2s ease;
    }
    .toast.show{ transform: translateY(0); opacity:1; }
    .toast .tTitle{ font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-size:12px; color:rgba(39,215,255,.92); }
    .toast .tMsg{ color:rgba(234,242,255,.78); font-size:12px; margin-top:3px; line-height:1.35; }
    .toast .tClose{
      border:none;
      background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:18px;
      line-height:1;
      padding:2px 6px;
    }

    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:60;
    }
    .modalOverlay.show{ display:flex; }
    .modal{
      width:min(720px, 100%);
      background: linear-gradient(180deg, rgba(12,16,34,.92), rgba(12,16,34,.72));
      border:1px solid rgba(61,220,255,.22);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding:14px;
      position:relative;
    }
    .modalTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:6px 6px 10px;
    }
    .modalTop .mTitle{
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:13px;
    }
    .modalTop .mClose{
      border:none; background:transparent;
      color:rgba(234,242,255,.55);
      cursor:pointer;
      font-size:20px; line-height:1;
      padding:4px 10px;
    }
  </style>
</head>

<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brandMark" aria-hidden="true"></div>
        <div>
          <div class="brandTitle">HELVARIX</div>
          <div class="brandSub">GLOBAL ARRAY</div>
        </div>
      </div>
      <div class="pill" id="statusPill" title="Account / Subscription">
        <span class="dot warn" id="statusDot"></span>
        <span id="statusText">SIGN IN REQUIRED</span>
      </div>
    </header>

    <main id="view" class="view"></main>

    <div class="toastWrap" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast">
        <div>
          <div class="tTitle" id="toastTitle">Notice</div>
          <div class="tMsg" id="toastMsg"></div>
        </div>
        <button class="tClose" id="toastClose" aria-label="Close">×</button>
      </div>
    </div>

    <div class="modalOverlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal">
        <div class="modalTop">
          <div class="mTitle" id="modalTitle">Modal</div>
          <button class="mClose" id="modalClose" aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <nav class="bottomNav" aria-label="Primary">
      <a class="navItem" href="#/campaigns" data-route="campaigns" title="Campaigns">
        <span class="ico">▦</span><span class="lbl">Campaigns</span>
      </a>
      <a class="navItem" href="#/telemetry" data-route="telemetry" title="Feed">
        <span class="ico">◉</span><span class="lbl">Feed</span>
      </a>
      <a class="navItem" href="#/submit" data-route="submit" title="Submit">
        <span class="ico">⌖</span><span class="lbl">Submit</span>
      </a>
      <a class="navItem" href="#/leaderboard" data-route="leaderboard" title="Ranks (Paid)">
        <span class="ico">🏆</span><span class="lbl">Ranks</span>
      </a>
      <a class="navItem" href="#/billing" data-route="billing" title="Billing">
        <span class="ico">⛨</span><span class="lbl">Billing</span>
      </a>
      <a class="navItem" href="#/profile" data-route="profile" title="Profile">
        <span class="ico">⦿</span><span class="lbl">Account</span>
      </a>
    </nav>
  </div>

  <script>
    /******************************************************************
     * HELVARIX ARRAY — CLIENT-SIDE BUILD
     * - Users cannot create campaigns; campaigns load from campaigns.json
     * - "Account" is local-only: email stored in localStorage
     * - Paywall is UI-only in client-side mode (no server verification)
     *   You can link to Stripe Checkout/Payment Links and mark "paid"
     *   on return, but real enforcement requires backend verification.
     ******************************************************************/

    /******************** DOM helpers ********************/
    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
    function el(tag, props={}, ...children){
      const node = document.createElement(tag);
      Object.assign(node, props);
      children.flat().filter(Boolean).forEach(ch => node.append(ch));
      return node;
    }
    const div = (cls, ...children) => el("div", { className: cls }, ...children);
    const h1 = (t) => el("div", { className:"sectionTitle", textContent:t });
    const sub = (t) => el("div", { className:"subTitle", textContent:t });
    const badge = (t, tone="") => el("div", { className:`badge ${tone}`, textContent:t });
    const hr = () => el("div", { className:"hr" });
    const empty = (title, msg) => el("div",{className:"empty"},
      el("div",{style:"margin-bottom:6px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(39,215,255,.92); font-size:12px;"}, title),
      el("div",{style:"color:rgba(234,242,255,.72); font-size:12px; line-height:1.4;"}, msg)
    );

    /******************** Toast + Modal ********************/
    const toastEl = $("#toast");
    const toastTitle = $("#toastTitle");
    const toastMsg = $("#toastMsg");
    const toastClose = $("#toastClose");
    let toastTimer = null;

    toastClose.addEventListener("click", hideToast);
    function showToast(title, msg, ms=2600){
      toastTitle.textContent = title;
      toastMsg.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, ms);
    }
    function hideToast(){ toastEl.classList.remove("show"); }

    const modalOverlay = $("#modalOverlay");
    const modalTitle = $("#modalTitle");
    const modalBody = $("#modalBody");
    const modalClose = $("#modalClose");

    modalClose.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });

    function openModal(title, bodyNode){
      modalTitle.textContent = title;
      modalBody.innerHTML = "";
      modalBody.append(bodyNode);
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      modalBody.innerHTML = "";
    }

    /******************** Storage (structured) ********************/
    const LS = {
      get(key, fallback){
        try{
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        }catch{ return fallback; }
      },
      set(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
    };

    /******************** IndexedDB (files) ********************/
    const IDB_NAME = "helvarix_files";
    const IDB_STORE = "files";

    function idbOpen(){
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE, { keyPath: "id" });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbPutFile(record){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readwrite");
        tx.objectStore(IDB_STORE).put(record);
        tx.oncomplete = () => { db.close(); resolve(true); };
        tx.onerror = () => { const err = tx.error; db.close(); reject(err); };
      });
    }
    async function idbGetFile(id){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readonly");
        const req = tx.objectStore(IDB_STORE).get(id);
        req.onsuccess = () => { const v = req.result || null; db.close(); resolve(v); };
        req.onerror = () => { const err = req.error; db.close(); reject(err); };
      });
    }
    async function idbDeleteFile(id){
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, "readwrite");
        tx.objectStore(IDB_STORE).delete(id);
        tx.oncomplete = () => { db.close(); resolve(true); };
        tx.onerror = () => { const err = tx.error; db.close(); reject(err); };
      });
    }

    /******************** Config ********************/
    const PRICING = {
      monthly: { label: "$15 / month", cents: 1500, days: 31 },
      annual:  { label: "$150 / year", cents: 15000, days: 365 }
    };

    // IMPORTANT:
    // Put your Stripe Payment Link / Checkout URL here.
    // These can be Stripe "Payment Links" (recommended) that redirect back to your site.
    const STRIPE_LINKS = {
      monthly: "REPLACE_WITH_STRIPE_PAYMENT_LINK_MONTHLY",
      annual:  "REPLACE_WITH_STRIPE_PAYMENT_LINK_ANNUAL"
    };

    // Where Stripe should redirect after payment.
    // If you use Stripe Payment Links, set their "After payment" redirect to:
    //   https://yourdomain.com/#/billing?success=1&plan=monthly
    //   https://yourdomain.com/#/billing?success=1&plan=annual
    //
    // In client-only mode, we will *trust that redirect* and mark them as paid locally.

    /******************** Data Model ********************/
    const DEFAULT_ACCOUNT = {
      email: "",
      createdAt: null
    };

    const DEFAULT_PROFILE = {
      callsign: "",
      region: "",
      equipment: "",
      allowGeo: false
    };

    const DEFAULT_SUBSCRIPTION = {
      plan: "free",            // "free" | "monthly" | "annual"
      active: false,
      activeUntil: null,       // ISO date
      lastUpdatedAt: null
    };

    const DB = {
      account: LS.get("hvx_account", DEFAULT_ACCOUNT),
      profile: LS.get("hvx_profile", DEFAULT_PROFILE),
      subscription: LS.get("hvx_subscription", DEFAULT_SUBSCRIPTION),

      campaigns: [], // loaded from campaigns.json
      submissions: LS.get("hvx_submissions", [])
    };

    function saveAll(){
      LS.set("hvx_account", DB.account);
      LS.set("hvx_profile", DB.profile);
      LS.set("hvx_subscription", DB.subscription);
      LS.set("hvx_submissions", DB.submissions);
    }

    /******************** Auth & Paywall logic ********************/
    function normalizeEmail(s){ return String(s||"").trim().toLowerCase(); }
    function isValidEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }

    function isSignedIn(){
      return !!DB.account.email && isValidEmail(DB.account.email);
    }

    function refreshSubscriptionStatus(){
      const sub = DB.subscription;
      if (!sub.activeUntil){
        sub.active = false;
        if (sub.plan !== "free") sub.plan = "free";
        return;
      }
      const now = Date.now();
      const until = new Date(sub.activeUntil).getTime();
      sub.active = until > now;
      if (!sub.active) sub.plan = "free";
    }

    function isPaid(){
      refreshSubscriptionStatus();
      return DB.subscription.active === true && (DB.subscription.plan === "monthly" || DB.subscription.plan === "annual");
    }

    // Decide which features are paid.
    // You can change these gates to whatever you want.
    const PAYWALLED_ROUTES = new Set([
      "/leaderboard" // for example: ranks are paid
    ]);

    function routeRequiresPaid(path){
      return PAYWALLED_ROUTES.has(path);
    }

    function updateStatusPill(){
      const dot = $("#statusDot");
      const text = $("#statusText");

      if (!isSignedIn()){
        dot.className = "dot bad";
        text.textContent = "SIGN IN REQUIRED";
        return;
      }
      if (isPaid()){
        dot.className = "dot cyan";
        const until = DB.subscription.activeUntil ? new Date(DB.subscription.activeUntil).toISOString().slice(0,10) : "";
        text.textContent = `ACTIVE • ${DB.subscription.plan.toUpperCase()} • ${until}`;
      } else {
        dot.className = "dot warn";
        text.textContent = "FREE • UPGRADE";
      }
    }

    function updateNavLocks(){
      const paid = isPaid();
      $$(".navItem").forEach(a => {
        const href = a.getAttribute("href") || "";
        const path = href.startsWith("#") ? href.slice(1) : href;
        if (routeRequiresPaid(path)){
          a.classList.toggle("locked", !paid);
        }
      });
    }

    /******************** Router ********************/
    const routes = {
      "/campaigns": renderCampaigns,
      "/telemetry": renderTelemetry,
      "/submit": renderSubmit,
      "/leaderboard": renderLeaderboard,
      "/billing": renderBilling,
      "/profile": renderProfile
    };

    init();

    async function init(){
      if (!location.hash) location.hash = "#/campaigns";

      window.addEventListener("hashchange", render);

      // Load campaigns from JSON (you control this file)
      await loadCampaigns();
      refreshSubscriptionStatus();
      updateStatusPill();
      updateNavLocks();
      render();
    }

    async function loadCampaigns(){
      // Try campaigns.json, otherwise fallback to empty.
      try{
        const res = await fetch("./campaigns.json", { cache:"no-store" });
        if (!res.ok) throw new Error("campaigns.json not found");
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("campaigns.json must be an array");
        // Normalize / validate lightly
        DB.campaigns = data
          .filter(c => c && typeof c === "object")
          .map(c => ({
            id: c.id || crypto.randomUUID?.() || String(Date.now()) + "_" + Math.random().toString(16).slice(2),
            kind: c.kind || "daily",
            title: String(c.title || "Untitled Campaign"),
            description: String(c.description || ""),
            mode: c.mode || "any",
            target: String(c.target || ""),
            goalSubmissions: Number.isFinite(Number(c.goalSubmissions)) ? Number(c.goalSubmissions) : null,
            startAt: c.startAt || null,
            endAt: c.endAt || null,
            archived: !!c.archived,
            createdAt: c.createdAt || null
          }));
      }catch(err){
        console.warn(err);
        DB.campaigns = [];
      }
    }

    function render(){
      // billing success handler (client-side trusted redirect)
      handleBillingSuccessIfPresent();

      const path = location.hash.replace("#","") || "/campaigns";
      const view = $("#view");
      const fn = routes[path.split("?")[0]] || renderNotFound;

      // Gate: email sign-in required for most actions
      // Campaign list can be viewed unsigned, but submitting requires sign-in.
      // Paid routes require paid plan.
      const cleanPath = path.split("?")[0];

      // highlight nav
      $$(".navItem").forEach(a => a.classList.toggle("active", a.getAttribute("href") === `#${cleanPath}`));

      // route enforcement
      if (routeRequiresPaid(cleanPath) && !isPaid()){
        location.hash = "#/billing";
        return;
      }

      view.innerHTML = "";
      fn(view);
      saveAll();
      updateStatusPill();
      updateNavLocks();
    }

      root.append(h1("Not Found"), sub("Route does not exist."));

    /******************** Utility ********************/

    const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));
    const fmtUTC = (d)=> new Date(d).toISOString().replace("T"," ").slice(0,16) + " UTC";

    function computeOIForSubmission(sub){
      const integ = Number(sub.integrationSeconds || 0);
      const snr = Number(sub.snrDb || 0);
      const mode = sub.mode;
      let base=200, wI=10, wS=5;
      if (mode==="radio"){ base=220; wI=8; wS=6; }
      if (mode==="spectral"){ base=240; wI=9; wS=6; }
      const v = base + (integ / wI) + (snr * wS);
      return Math.max(0, Math.round(v));
    }

    function computeCIForSubmission(sub){
      const snr = Number(sub.snrDb || 0);
      const seeing = Number(sub.seeingArcsec || 0);
      const transparency = Number(sub.transparency || 0);
      let score = 50 + snr * 8;
      if (seeing) score += clamp((2.5 - seeing) * 20, -30, 30);
      if (transparency) score += (transparency - 3) * 12;
      return Math.max(0, Math.round(score));
    }

    function matchesCampaign(c, sub){
      const now = Date.now();
      if (c.startAt && now < new Date(c.startAt).getTime()) return false;
      if (c.endAt && now > new Date(c.endAt).getTime()) return false;

      if (c.mode && c.mode !== "any" && c.mode !== sub.mode) return false;

      const t = (sub.target || "").trim().toLowerCase();
      const ct = (c.target || "").trim().toLowerCase();
      if (ct){
        const list = ct.split(",").map(s=>s.trim()).filter(Boolean);
        if (!list.some(x => t === x || t.startsWith(x))) return false;
      }
      return true;
    }

    function computeCampaignProgress(c){
      const goal = Math.max(1, Number(c.goalSubmissions || 1));
      const matching = DB.submissions.filter(s => matchesCampaign(c, s)).length;
      const pct = clamp((matching / goal) * 100, 0, 100);
      return { matching, goal, pct: Math.round(pct) };
    }

    function sortedLeaderboard(){
      const map = new Map();
      for (const s of DB.submissions){
        const key = s.operatorCallsign || "UNKNOWN";
        const cur = map.get(key) || { callsign:key, oi:0, ci:0, submissions:0, region: s.operatorRegion || "" };
        cur.oi += Number(s.oi || 0);
        cur.ci += Number(s.ci || 0);
        cur.submissions += 1;
        if (!cur.region && s.operatorRegion) cur.region = s.operatorRegion;
        map.set(key, cur);
      }
      return Array.from(map.values()).sort((a,b)=>b.oi-a.oi);
    }

    /******************** Forms helpers ********************/
    function fieldInput(label, opts){
      const { type="text", placeholder="", value="", oninput=null, attrs={} } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const inp = el("input",{className:"field", type, placeholder, value, ...attrs});
      if (oninput) inp.addEventListener("input", () => oninput(inp.value));
      wrap.append(inp);
      return { wrap, input: inp };
    }

    function fieldTextarea(label, opts){
      const { placeholder="", value="", oninput=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const ta = el("textarea",{className:"field", placeholder});
      ta.value = value;
      if (oninput) ta.addEventListener("input", () => oninput(ta.value));
      wrap.append(ta);
      return { wrap, textarea: ta };
    }

    function fieldSelect(label, opts){
      const { options=[], value="", onchange=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const sel = el("select",{className:"field"});
      for (const o of options){
        const opt = el("option",{ value:o.value, textContent:o.label });
        if (o.value === value) opt.selected = true;
        sel.append(opt);
      }
      if (onchange) sel.addEventListener("change", () => onchange(sel.value));
      wrap.append(sel);
      return { wrap, select: sel };
    }

    function fieldSlider(label, opts){
      const { min=1, max=5, value=3, onchange=null } = opts || {};
      const wrap = el("div");
      wrap.append(el("div",{className:"label",textContent:label}));
      const row = div("row");
      const range = el("input",{ type:"range", min, max, value, style:"width:100%" });
      const read = el("div",{ className:"kpi", textContent:String(value) });
      range.addEventListener("input", () => {
        read.textContent = String(range.value);
        if (onchange) onchange(Number(range.value));
      });
      row.append(range, read);
      wrap.append(row);
      return { wrap, range };
    }

    function fileAcceptForMode(mode){
      if (mode==="visual") return "image/*,.tif,.tiff,.fits,.fit,.zip,.json,.csv";
      if (mode==="radio") return "audio/*,.wav,.zip,.json,.csv";
      if (mode==="spectral") return ".zip,.json,.csv,.txt";
      return "*/*";
    }

    /******************** Billing success handler ********************/
    function handleBillingSuccessIfPresent(){
      const hash = location.hash || "";
      if (!hash.startsWith("#/billing")) return;

      const qIndex = hash.indexOf("?");
      if (qIndex === -1) return;

      const qs = hash.slice(qIndex + 1);
      const params = new URLSearchParams(qs);

      const success = params.get("success");
      const plan = params.get("plan");

      if (success !== "1") return;
      if (!plan || !(plan in PRICING)) return;

      // Client-side TRUSTED redirect: mark as paid locally
      const days = PRICING[plan].days;
      const until = new Date(Date.now() + days * 24*60*60*1000);

      DB.subscription.plan = plan;
      DB.subscription.active = true;
      DB.subscription.activeUntil = until.toISOString();
      DB.subscription.lastUpdatedAt = new Date().toISOString();
      saveAll();

      // remove query from hash so it doesn't re-trigger
      location.hash = "#/billing";
      showToast("Subscription Activated", `Plan: ${plan.toUpperCase()} (local unlock).`);
    }
